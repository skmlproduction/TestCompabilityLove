name: Release assemble

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - name: Verify and build release bundle
        run: ./gradlew verifyLoveTestRelease --no-daemon
      - name: Upload unsigned AAB
        uses: actions/upload-artifact@v4
        with:
          name: love-tester-release-aab
          path: app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: love-tester-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
      - name: Upload R8 mapping
        uses: actions/upload-artifact@v4
        with:
          name: love-tester-release-mapping
          path: app/build/outputs/mapping/release/mapping.txt
          if-no-files-found: warn
