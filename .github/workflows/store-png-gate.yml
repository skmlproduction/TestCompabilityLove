name: Store PNG gate

on:
  push:
    branches: [main, master]
    paths:
      - "docs/screenshots/**"
      - "docs/product/screens_catalog.csv"
      - "scripts/verify_ui_inventory.py"
  pull_request:
    paths:
      - "docs/screenshots/**"
      - "docs/product/screens_catalog.csv"
      - "scripts/verify_ui_inventory.py"
  workflow_dispatch:

jobs:
  store-png-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - name: PNG inventory gate
        run: |
          python3 -m py_compile scripts/verify_ui_inventory.py
          python3 scripts/verify_ui_inventory.py --require-screenshots --fail-on-placeholders
      - name: Upload listing screenshots artifact
        uses: actions/upload-artifact@v4
        with:
          name: store-listing-screenshots
          path: |
            docs/screenshots/ru/hub_main.png
            docs/screenshots/ru/love_test_input.png
            docs/screenshots/ru/love_test_result.png
            docs/screenshots/en/hub_main.png
            docs/screenshots/en/love_test_input.png
            docs/screenshots/en/love_test_result.png
          if-no-files-found: warn
