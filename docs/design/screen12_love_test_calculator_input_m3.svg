  <text x="540" y="176" text-anchor="middle" class="headline" style="font-size: 36px;">&#1050;&#1072;&#1083;&#1100;&#1082;&#1091;&#1083;&#1103;&#1090;&#1086;&#1088; &#1083;&#1102;&#1073;&#1074;&#1080;</text>
