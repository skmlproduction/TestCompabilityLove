<?xml version="1.0" encoding="UTF-8"?>
<svg width="1080" height="2400" viewBox="0 0 1080 2400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#1C1B1F" flood-opacity="0.08"/>
      <feDropShadow dx="0" dy="2" stdDeviation="7" flood-color="#C2185B" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="bgGlow" x1="100" y1="0" x2="980" y2="700" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF5F8"/>
      <stop offset="0.5" stop-color="#FFFBFE"/>
      <stop offset="1" stop-color="#FCE4EC"/>
    </linearGradient>
    <linearGradient id="heroGradient" x1="72" y1="200" x2="1008" y2="540" gradientUnits="userSpaceOnUse">
      <stop stop-color="#AD1457"/>
      <stop offset="0.5" stop-color="#C2185B"/>
      <stop offset="1" stop-color="#F48FB1"/>
    </linearGradient>
    <style type="text/css"><![CDATA[
      .section { font-family: Inter, Roboto, Arial, sans-serif; font-size: 21px; font-weight: 760; letter-spacing: 3px; fill: #C2185B; }
      .headline { font-family: Inter, Roboto, Arial, sans-serif; font-size: 48px; font-weight: 800; letter-spacing: -1px; fill: #1C1B1F; }
      .body { font-family: Inter, Roboto, Arial, sans-serif; font-size: 28px; font-weight: 450; fill: #625B71; }
      .heroTitle { font-family: Inter, Roboto, Arial, sans-serif; font-size: 36px; font-weight: 830; fill: #FFFFFF; }
      .heroBody { font-family: Inter, Roboto, Arial, sans-serif; font-size: 24px; font-weight: 450; fill: #FFFFFF; opacity: 0.9; }
      .fieldLabel { font-family: Inter, Roboto, Arial, sans-serif; font-size: 24px; font-weight: 650; fill: #C2185B; }
      .fieldText { font-family: Inter, Roboto, Arial, sans-serif; font-size: 32px; font-weight: 520; fill: #1C1B1F; }
      .fieldHint { font-family: Inter, Roboto, Arial, sans-serif; font-size: 22px; font-weight: 450; fill: #625B71; }
      .buttonText { font-family: Inter, Roboto, Arial, sans-serif; font-size: 29px; font-weight: 760; fill: #FFFFFF; }
      .caption { font-family: Inter, Roboto, Arial, sans-serif; font-size: 21px; font-weight: 470; fill: #625B71; }
      .backText { font-family: Inter, Roboto, Arial, sans-serif; font-size: 28px; font-weight: 680; fill: #C2185B; }
      .avatarInitial { font-family: Inter, Roboto, Arial, sans-serif; font-size: 40px; font-weight: 800; fill: #FFFFFF; text-anchor: middle; }
    ]]></style>
  </defs>

  <rect width="1080" height="2400" fill="url(#bgGlow)"/>
  <circle cx="160" cy="220" r="140" fill="#F8BBD0" opacity="0.45"/>
  <circle cx="920" cy="1880" r="220" fill="#FCE4EC" opacity="0.4"/>

  <rect x="0" y="0" width="1080" height="96" fill="#FFFBFE" opacity="0.72"/>
  <text x="78" y="62" class="caption" fill="#1C1B1F">9:41</text>
  <rect x="892" y="43" width="58" height="22" rx="8" stroke="#1C1B1F" stroke-width="3" opacity="0.72"/>
  <rect x="955" y="49" width="6" height="10" rx="3" fill="#1C1B1F" opacity="0.72"/>
  <rect x="900" y="49" width="40" height="10" rx="5" fill="#1C1B1F" opacity="0.72"/>

  <g transform="translate(72 140)">
    <path d="M48 24 L12 24 L30 6 Z" fill="#C2185B" transform="rotate(-90 30 15)"/>
    <text x="72" y="36" class="backText">&#1053;&#1072;&#1079;&#1072;&#1076;</text>
  </g>
  <text x="540" y="176" text-anchor="middle" class="headline" style="font-size: 34px;">&#1057;&#1086;&#1074;&#1084;&#1077;&#1089;&#1090;&#1080;&#1084;&#1086;&#1089;&#1090;&#1100; &#1087;&#1072;&#1088;&#1099;</text>
  <text x="72" y="228" class="section">EKRAN 14 / PAIR INPUT</text>

