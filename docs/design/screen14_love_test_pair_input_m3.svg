  <text x="540" y="1478" text-anchor="middle" class="buttonText">&#1055;&#1088;&#1086;&#1074;&#1077;&#1088;&#1080;&#1090;&#1100; &#1087;&#1072;&#1088;&#1091;</text>

  <!-- Keyboard -->
  <rect x="0" y="1580" width="1080" height="520" rx="0" fill="#F3EDF7" opacity="0.95"/>
  <line x1="0" y1="1580" x2="1080" y2="1580" stroke="#E7E0EC" stroke-width="2"/>
  <text x="540" y="1640" text-anchor="middle" class="caption">&#1057;&#1080;&#1089;&#1090;&#1077;&#1084;&#1085;&#1072;&#1103; &#1082;&#1083;&#1072;&#1074;&#1080;&#1072;&#1090;&#1091;&#1088;&#1072; (IME)</text>
  <rect x="48" y="1680" width="96" height="72" rx="12" fill="#FFFFFF"/>
  <rect x="160" y="1680" width="96" height="72" rx="12" fill="#FFFFFF"/>
  <rect x="272" y="1680" width="96" height="72" rx="12" fill="#FFFFFF"/>
  <rect x="384" y="1680" width="96" height="72" rx="12" fill="#FFFFFF"/>
  <rect x="496" y="1680" width="96" height="72" rx="12" fill="#FFFFFF"/>
  <rect x="608" y="1680" width="96" height="72" rx="12" fill="#FFFFFF"/>
  <rect x="720" y="1680" width="96" height="72" rx="12" fill="#FFFFFF"/>
  <rect x="832" y="1680" width="96" height="72" rx="12" fill="#FFFFFF"/>
  <rect x="780" y="1940" width="252" height="72" rx="16" fill="#C2185B" opacity="0.4"/>
  <text x="906" y="1988" text-anchor="middle" style="font-family: Inter, Roboto, Arial, sans-serif; font-size: 22px; font-weight: 700; fill: #FFFFFF;">&#1043;&#1086;&#1090;&#1086;&#1074;&#1086;</text>
