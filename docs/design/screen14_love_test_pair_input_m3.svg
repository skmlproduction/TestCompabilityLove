  <circle cx="360" cy="400" r="72" fill="#FFFFFF" opacity="0.25"/>
  <circle cx="540" cy="400" r="72" fill="#FFFFFF" opacity="0.35"/>
  <circle cx="720" cy="400" r="72" fill="#FFFFFF" opacity="0.25"/>
  <rect x="500" y="368" width="80" height="64" rx="20" fill="#FFFFFF" opacity="0.2"/>
  <path d="M528 400 L552 400" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round"/>
  <path d="M540 388 L540 412" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round"/>
  <text x="120" y="340" class="heroTitle">&#1044;&#1074;&#1072; &#1080;&#1084;&#1077;&#1085;&#1080; &#8212; &#1086;&#1076;&#1085;&#1072; &#1087;&#1072;&#1088;&#1072;</text>
  <text x="120" y="388" class="heroBody">&#1057;&#1088;&#1072;&#1074;&#1085;&#1080;&#1074;&#1072;&#1077;&#1084; &#1089;&#1086;&#1074;&#1084;&#1077;&#1089;&#1090;&#1080;&#1084;&#1086;&#1089;&#1090;&#1100;</text>
  <text x="120" y="420" class="heroBody">&#1080; &#1087;&#1086;&#1082;&#1072;&#1079;&#1099;&#1074;&#1072;&#1077;&#1084; &#1086;&#1073;&#1097;&#1080;&#1081; &#1087;&#1088;&#1086;&#1094;&#1077;&#1085;&#1090;.</text>
  <rect x="760" y="440" width="180" height="44" rx="22" fill="#FFFFFF" opacity="0.22"/>
  <text x="850" y="472" text-anchor="middle" style="font-family: Inter, Roboto, Arial, sans-serif; font-size: 22px; font-weight: 760; fill: #FFFFFF;">&#1058;&#1077;&#1089;&#1090; &#8470;3</text>

  <!-- Pair preview strip -->
  <rect x="72" y="540" width="936" height="140" rx="32" fill="#FFFBFE" filter="url(#cardShadow)"/>
  <circle cx="280" cy="620" r="48" fill="#FCE4EC"/>
  <text x="280" y="636" class="avatarInitial" fill="#C2185B">&#1040;</text>
  <circle cx="800" cy="620" r="48" fill="#F8BBD0"/>
  <text x="800" y="636" class="avatarInitial" fill="#880E4F">?</text>
  <path d="M360 620 C420 580 480 580 540 620 C600 660 660 660 720 620" stroke="#C2185B" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.5"/>
  <circle cx="540" cy="620" r="28" fill="#C2185B"/>
  <path d="M528 620 L540 608 L552 620 L540 632 Z" fill="#FFFFFF" transform="translate(0 -4)"/>

  <!-- Form -->
  <rect x="72" y="720" width="936" height="640" rx="38" fill="#FFFBFE" filter="url(#cardShadow)"/>

  <text x="120" y="800" class="fieldLabel">&#1048;&#1084;&#1103; 1</text>
  <rect x="120" y="820" width="840" height="96" rx="28" fill="#FFFFFF" stroke="#C2185B" stroke-width="3"/>
  <text x="152" y="882" class="fieldText">&#1057;&#1086;&#1092;&#1080;&#1103;</text>
  <circle cx="280" cy="868" r="0" fill="none"/>

  <text x="120" y="980" class="fieldLabel">&#1048;&#1084;&#1103; 2</text>
  <rect x="120" y="1000" width="840" height="96" rx="28" fill="#FFFFFF" stroke="#CAC4D0" stroke-width="2"/>
  <text x="152" y="1062" class="fieldHint">&#1053;&#1072;&#1087;&#1088;&#1080;&#1084;&#1077;&#1088;, &#1044;&#1084;&#1080;&#1090;&#1088;&#1080;&#1081;&#8230;</text>

  <!-- Side-by-side mini cards -->
  <text x="120" y="1160" class="fieldHint">&#1041;&#1099;&#1089;&#1090;&#1088;&#1099;&#1081; &#1074;&#1099;&#1073;&#1086;&#1088;:</text>
  <rect x="120" y="1180" width="200" height="56" rx="28" fill="#FCE4EC"/>
  <text x="220" y="1216" text-anchor="middle" class="fieldHint" fill="#880E4F">&#1057;&#1086;&#1092;&#1080;&#1103; + &#1044;&#1080;&#1084;&#1072;</text>
  <rect x="340" y="1180" width="220" height="56" rx="28" fill="#FCE4EC"/>
  <text x="450" y="1216" text-anchor="middle" class="fieldHint" fill="#880E4F">&#1045;&#1083;&#1077;&#1085;&#1072; + &#1040;&#1083;&#1077;&#1082;&#1089;</text>

  <rect x="120" y="1260" width="840" height="72" rx="24" fill="#FCE4EC"/>
  <text x="152" y="1308" class="body" fill="#880E4F" style="font-size: 24px;">&#1055;&#1072;&#1088;&#1072; &#1085;&#1077; &#1089;&#1086;&#1093;&#1088;&#1072;&#1085;&#1103;&#1077;&#1090;&#1089;&#1103; &#1085;&#1072; &#1091;&#1089;&#1090;&#1088;&#1086;&#1081;&#1089;&#1090;&#1074;&#1077;.</text>

  <!-- CTA -->
