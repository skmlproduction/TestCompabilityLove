  <text x="460" y="630" text-anchor="middle" style="font-family: Inter, Roboto, Arial, sans-serif; font-size: 22px; font-weight: 800; fill: #C2185B;">&#1057;&#1082;&#1086;&#1088;&#1086;</text>
  <text x="560" y="630" class="fieldHint">&#8594; &#1087;&#1077;&#1088;&#1089;&#1086;&#1085;&#1072;&#1083;&#1100;&#1085;&#1099;&#1081; &#1087;&#1088;&#1086;&#1075;&#1085;&#1086;&#1079;</text>

