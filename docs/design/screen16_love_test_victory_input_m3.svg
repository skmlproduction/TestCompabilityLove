  <text x="120" y="388" class="heroBody">&#1042;&#1074;&#1077;&#1076;&#1080;&#1090;&#1077; &#1089;&#1074;&#1086;&#1105; &#1080;&#1084;&#1103; &#8212; &#1091;&#1079;&#1085;&#1072;&#1077;&#1084;,</text>
