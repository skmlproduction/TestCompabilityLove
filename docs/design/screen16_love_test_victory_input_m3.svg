  <text x="540" y="176" text-anchor="middle" class="headline" style="font-size: 34px;">&#1055;&#1086;&#1073;&#1077;&#1076;&#1072; &#1074; &#1083;&#1102;&#1073;&#1074;&#1080;</text>
  <text x="72" y="228" class="section">EKRAN 16 / VICTORY INPUT</text>

