  <rect x="760" y="440" width="180" height="44" rx="22" fill="#FFFFFF" opacity="0.22"/>
  <text x="850" y="472" text-anchor="middle" style="font-family: Inter, Roboto, Arial, sans-serif; font-size: 22px; font-weight: 760; fill: #FFFFFF;">&#1058;&#1077;&#1089;&#1090; &#8470;4</text>

