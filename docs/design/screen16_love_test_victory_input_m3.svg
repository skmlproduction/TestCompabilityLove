    <rect x="-32" y="72" width="64" height="8" rx="4" fill="#FFFFFF" opacity="0.5"/>
    <path d="M-50 -20 C-50 -36 -30 -48 0 -48 C30 -48 50 -36 50 -20" fill="none" stroke="#FFFFFF" stroke-width="6" opacity="0.4"/>
