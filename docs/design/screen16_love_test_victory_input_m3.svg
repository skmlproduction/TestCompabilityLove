  <rect x="120" y="1020" width="140" height="48" rx="24" fill="#FCE4EC"/>
  <text x="190" y="1052" text-anchor="middle" class="fieldHint" fill="#880E4F">&#1054;&#1083;&#1100;&#1075;&#1072;</text>
  <rect x="280" y="1020" width="160" height="48" rx="24" fill="#FCE4EC"/>
  <text x="360" y="1052" text-anchor="middle" class="fieldHint" fill="#880E4F">&#1040;&#1085;&#1072;&#1089;&#1090;&#1072;&#1089;&#1080;&#1103;</text>
