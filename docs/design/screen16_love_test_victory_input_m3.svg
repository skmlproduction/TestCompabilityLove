  <rect x="72" y="540" width="936" height="160" rx="32" fill="#FFFBFE" filter="url(#cardShadow)"/>
  <rect x="120" y="590" width="120" height="60" rx="16" fill="#E8F5E9"/>
  <text x="180" y="630" text-anchor="middle" style="font-family: Inter, Roboto, Arial, sans-serif; font-size: 22px; font-weight: 800; fill: #2E7D32;">&#1044;&#1072;</text>
  <rect x="260" y="590" width="120" height="60" rx="16" fill="#FFF8E1"/>
  <text x="320" y="630" text-anchor="middle" style="font-family: Inter, Roboto, Arial, sans-serif; font-size: 22px; font-weight: 800; fill: #F57F17;">?</text>
