  <rect x="120" y="590" width="48" height="48" rx="12" fill="#E8DEF8"/>
  <text x="144" y="624" class="letterTile">L</text>
  <rect x="180" y="590" width="48" height="48" rx="12" fill="#E8DEF8"/>
  <text x="204" y="624" class="letterTile">O</text>
  <rect x="240" y="590" width="48" height="48" rx="12" fill="#FCE4EC"/>
  <text x="264" y="624" class="letterTile" fill="#C2185B">V</text>
  <rect x="300" y="590" width="48" height="48" rx="12" fill="#E8DEF8"/>
  <text x="324" y="624" class="letterTile">E</text>
  <text x="400" y="624" class="fieldHint">+</text>
  <rect x="440" y="590" width="48" height="48" rx="12" fill="#F3EDF7"/>
  <text x="464" y="624" class="letterTile" fill="#49454F">?</text>
  <text x="520" y="624" class="fieldHint">&#8594; &#1088;&#1072;&#1089;&#1096;&#1080;&#1092;&#1088;&#1086;&#1074;&#1082;&#1072; &#1085;&#1072; &#1101;&#1082;&#1088;&#1072;&#1085;&#1077; &#1088;&#1077;&#1079;&#1091;&#1083;&#1100;&#1090;&#1072;&#1090;&#1072;</text>

  <!-- Form -->
