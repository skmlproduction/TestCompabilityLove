  <text x="540" y="176" text-anchor="middle" class="headline" style="font-size: 34px;">&#1058;&#1077;&#1089;&#1090; &#1087;&#1086; &#1073;&#1091;&#1082;&#1074;&#1072;&#1084;</text>
  <text x="72" y="228" class="section">EKRAN 18 / LETTERS INPUT</text>

