  <rect x="608" y="1620" width="96" height="72" rx="12" fill="#FFFFFF"/>
  <rect x="720" y="1620" width="96" height="72" rx="12" fill="#FFFFFF"/>
  <rect x="832" y="1620" width="96" height="72" rx="12" fill="#FFFFFF"/>
  <rect x="780" y="1880" width="252" height="72" rx="16" fill="#6750A4" opacity="0.5"/>
  <text x="906" y="1928" text-anchor="middle" style="font-family: Inter, Roboto, Arial, sans-serif; font-size: 22px; font-weight: 700; fill: #FFFFFF;">&#1043;&#1086;&#1090;&#1086;&#1074;&#1086;</text>
