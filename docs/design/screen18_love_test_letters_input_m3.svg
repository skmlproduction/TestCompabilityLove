  <rect x="788" y="340" width="56" height="56" rx="14" fill="#FFFFFF" opacity="0.2"/>
  <text x="816" y="380" class="letterTile" fill="#FFFFFF">Z</text>
  <rect x="848" y="380" width="48" height="48" rx="12" fill="#FFFFFF" opacity="0.15"/>
  <text x="872" y="414" style="font-family: Inter, Roboto, Arial, sans-serif; font-size: 22px; font-weight: 800; fill: #FFFFFF; text-anchor: middle;">a</text>
  <text x="120" y="340" class="heroTitle">&#1057;&#1080;&#1084;&#1074;&#1086;&#1083;&#1099; &#1080; &#1073;&#1091;&#1082;&#1074;&#1099;</text>
  <text x="120" y="388" class="heroBody">&#1042;&#1074;&#1077;&#1076;&#1080;&#1090;&#1077; &#1076;&#1074;&#1072; &#1089;&#1083;&#1086;&#1074;&#1072; &#1080;&#1083;&#1080; &#1080;&#1084;&#1077;&#1085;&#1080; &#8212;</text>
  <text x="120" y="420" class="heroBody">&#1087;&#1086;&#1083;&#1091;&#1095;&#1080;&#1090;&#1077; &#1089;&#1082;&#1088;&#1099;&#1090;&#1086;&#1077; &#1087;&#1086;&#1089;&#1083;&#1072;&#1085;&#1080;&#1077;.</text>
  <rect x="760" y="440" width="180" height="44" rx="22" fill="#FFFFFF" opacity="0.22"/>
  <text x="850" y="472" text-anchor="middle" style="font-family: Inter, Roboto, Arial, sans-serif; font-size: 22px; font-weight: 760; fill: #FFFFFF;">&#1058;&#1077;&#1089;&#1090; &#8470;5</text>

  <!-- Letter stream preview -->
