  <text x="120" y="800" class="fieldLabel">&#1055;&#1077;&#1088;&#1074;&#1086;&#1077; &#1089;&#1083;&#1086;&#1074;&#1086;</text>
  <rect x="120" y="820" width="840" height="96" rx="28" fill="#FFFFFF" stroke="#6750A4" stroke-width="3"/>
  <text x="152" y="882" class="fieldText">&#1051;&#1070;&#1041;&#1054;&#1042;&#1068;</text>

  <text x="120" y="980" class="fieldLabel">&#1042;&#1090;&#1086;&#1088;&#1086;&#1077; &#1089;&#1083;&#1086;&#1074;&#1086;</text>
  <rect x="120" y="1000" width="840" height="96" rx="28" fill="#FFFFFF" stroke="#CAC4D0" stroke-width="2"/>
  <text x="152" y="1062" class="fieldHint">&#1053;&#1072;&#1087;&#1088;&#1080;&#1084;&#1077;&#1088;, &#1057;&#1063;&#1040;&#1057;&#1058;&#1068;&#8230;</text>

  <rect x="120" y="1140" width="840" height="100" rx="24" fill="#F3EDF7"/>
  <text x="152" y="1188" class="body" style="font-size: 26px;">&#1052;&#1086;&#1078;&#1085;&#1086; &#1080;&#1084;&#1103;, &#1085;&#1080;&#1082; &#1080;&#1083;&#1080; &#1082;&#1086;&#1088;&#1086;&#1090;&#1082;&#1086;&#1077; &#1089;&#1083;&#1086;&#1074;&#1086;.</text>
  <text x="152" y="1224" class="caption">&#1050;&#1080;&#1088;&#1080;&#1083;&#1083;&#1080;&#1094;&#1072; &#1080; &#1083;&#1072;&#1090;&#1080;&#1085;&#1080;&#1094;&#1072;.</text>

  <text x="120" y="1280" class="fieldHint">&#1043;&#1086;&#1090;&#1086;&#1074;&#1099;&#1077; &#1087;&#1088;&#1080;&#1084;&#1077;&#1088;&#1099;:</text>
  <rect x="120" y="1300" width="360" height="48" rx="24" fill="#E8DEF8"/>
  <text x="300" y="1332" text-anchor="middle" class="fieldHint" fill="#4A148C">&#1051;&#1070;&#1041;&#1054;&#1042;&#1068; + &#1057;&#1063;&#1040;&#1057;&#1058;&#1068;</text>

  <!-- CTA -->
  <rect x="72" y="1380" width="936" height="96" rx="48" fill="#C2185B" filter="url(#cardShadow)"/>
