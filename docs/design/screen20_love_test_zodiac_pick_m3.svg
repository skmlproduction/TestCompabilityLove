  <rect x="120" y="1100" width="260" height="120" rx="24" fill="#F3EDF7"/>
  <text x="250" y="1172" class="signLabel">&#1042;&#1077;&#1089;&#1099;</text>
  <rect x="410" y="1100" width="260" height="120" rx="24" fill="#F3EDF7"/>
  <text x="540" y="1172" class="signLabel">&#1057;&#1082;&#1086;&#1088;&#1087;&#1080;&#1086;&#1085;</text>
  <rect x="700" y="1100" width="260" height="120" rx="24" fill="#F3EDF7"/>
  <text x="830" y="1172" class="signLabel">&#1057;&#1090;&#1088;&#1077;&#1083;&#1077;&#1094;</text>

