  <text x="120" y="1420" class="caption">&#1053;&#1072;&#1078;&#1084;&#1080;&#1090;&#1077; &#1085;&#1072; &#1079;&#1085;&#1072;&#1082; &#8212; &#1079;&#1072;&#1087;&#1086;&#1083;&#1085;&#1103;&#1077;&#1090;&#1089;&#1103; &#1089;&#1083;&#1086;&#1090; 1, &#1079;&#1072;&#1090;&#1077;&#1084; &#1089;&#1083;&#1086;&#1090; 2.</text>

  <!-- CTA -->
