  <!-- Row 1 -->
  <rect x="120" y="820" width="260" height="120" rx="24" fill="#F3EDF7"/>
  <text x="250" y="892" class="signLabel">&#1054;&#1074;&#1077;&#1085;</text>
  <rect x="410" y="820" width="260" height="120" rx="24" fill="#F3EDF7"/>
  <text x="540" y="892" class="signLabel">&#1058;&#1077;&#1083;&#1077;&#1094;</text>
