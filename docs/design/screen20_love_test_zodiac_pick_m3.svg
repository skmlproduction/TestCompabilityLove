<?xml version="1.0" encoding="UTF-8"?>
<svg width="1080" height="2400" viewBox="0 0 1080 2400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#1C1B1F" flood-opacity="0.08"/>
      <feDropShadow dx="0" dy="2" stdDeviation="7" flood-color="#1A237E" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="bgGlow" x1="100" y1="0" x2="980" y2="800" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E8EAF6"/>
      <stop offset="0.45" stop-color="#FFFBFE"/>
      <stop offset="1" stop-color="#F3EDF7"/>
    </linearGradient>
    <linearGradient id="heroGradient" x1="72" y1="200" x2="1008" y2="480" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1A237E"/>
      <stop offset="0.5" stop-color="#512DA8"/>
      <stop offset="1" stop-color="#C2185B"/>
    </linearGradient>
    <style type="text/css"><![CDATA[
      .section { font-family: Inter, Roboto, Arial, sans-serif; font-size: 21px; font-weight: 760; letter-spacing: 3px; fill: #512DA8; }
      .headline { font-family: Inter, Roboto, Arial, sans-serif; font-size: 48px; font-weight: 800; letter-spacing: -1px; fill: #1C1B1F; }
      .heroTitle { font-family: Inter, Roboto, Arial, sans-serif; font-size: 36px; font-weight: 830; fill: #FFFFFF; }
      .heroBody { font-family: Inter, Roboto, Arial, sans-serif; font-size: 24px; font-weight: 450; fill: #FFFFFF; opacity: 0.92; }
      .signLabel { font-family: Inter, Roboto, Arial, sans-serif; font-size: 22px; font-weight: 700; fill: #1C1B1F; text-anchor: middle; }
      .signLabelSel { font-family: Inter, Roboto, Arial, sans-serif; font-size: 22px; font-weight: 800; fill: #FFFFFF; text-anchor: middle; }
      .slotLabel { font-family: Inter, Roboto, Arial, sans-serif; font-size: 24px; font-weight: 650; fill: #512DA8; }
      .buttonText { font-family: Inter, Roboto, Arial, sans-serif; font-size: 29px; font-weight: 760; fill: #FFFFFF; }
      .caption { font-family: Inter, Roboto, Arial, sans-serif; font-size: 21px; font-weight: 470; fill: #625B71; }
      .backText { font-family: Inter, Roboto, Arial, sans-serif; font-size: 28px; font-weight: 680; fill: #512DA8; }
    ]]></style>
  </defs>

  <rect width="1080" height="2400" fill="url(#bgGlow)"/>
