      .benefitBody { font-family: Inter, Roboto, Arial, sans-serif; font-size: 26px; font-weight: 450; fill: #625B71; }
      .priceBig { font-family: Inter, Roboto, Arial, sans-serif; font-size: 56px; font-weight: 800; fill: #1C1B1F; text-anchor: middle; }
      .priceSub { font-family: Inter, Roboto, Arial, sans-serif; font-size: 24px; font-weight: 450; fill: #625B71; text-anchor: middle; }
      .buttonText { font-family: Inter, Roboto, Arial, sans-serif; font-size: 30px; font-weight: 800; fill: #FFFFFF; }
      .restoreText { font-family: Inter, Roboto, Arial, sans-serif; font-size: 26px; font-weight: 680; fill: #C2185B; text-anchor: middle; }
      .legalText { font-family: Inter, Roboto, Arial, sans-serif; font-size: 20px; font-weight: 450; fill: #625B71; text-anchor: middle; }
      .caption { font-family: Inter, Roboto, Arial, sans-serif; font-size: 21px; font-weight: 470; fill: #625B71; }
