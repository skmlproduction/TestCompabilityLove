  <text x="540" y="1820" text-anchor="middle" class="caption">&#1055;&#1086;&#1082;&#1091;&#1087;&#1082;&#1072; &#1087;&#1088;&#1080;&#1074;&#1103;&#1079;&#1072;&#1085;&#1072; &#1082; &#1074;&#1072;&#1096;&#1077;&#1084;&#1091; Google-&#1072;&#1082;&#1082;&#1072;&#1091;&#1085;&#1090;&#1091;</text>
