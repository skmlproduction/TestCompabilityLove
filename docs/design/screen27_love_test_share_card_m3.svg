      .sheetTitle { font-family: Inter, Roboto, Arial, sans-serif; font-size: 34px; font-weight: 800; fill: #FFFFFF; text-anchor: middle; }
      .targetLabel { font-family: Inter, Roboto, Arial, sans-serif; font-size: 20px; font-weight: 600; fill: #FFFFFF; text-anchor: middle; opacity: 0.9; }
      .cancelText { font-family: Inter, Roboto, Arial, sans-serif; font-size: 28px; font-weight: 680; fill: #FFFFFF; text-anchor: middle; }
      .brandSmall { font-family: Inter, Roboto, Arial, sans-serif; font-size: 28px; font-weight: 800; fill: #FFFFFF; }
      .percentHuge { font-family: Inter, Roboto, Arial, sans-serif; font-size: 140px; font-weight: 800; fill: #FFFFFF; text-anchor: middle; }
      .namesCard { font-family: Inter, Roboto, Arial, sans-serif; font-size: 40px; font-weight: 740; fill: #FFFFFF; text-anchor: middle; }
      .tagline { font-family: Inter, Roboto, Arial, sans-serif; font-size: 26px; font-weight: 500; fill: #FFFFFF; text-anchor: middle; opacity: 0.92; }
      .disclaimerCard { font-family: Inter, Roboto, Arial, sans-serif; font-size: 18px; font-weight: 450; fill: #FFFFFF; text-anchor: middle; opacity: 0.75; }
    ]]></style>
