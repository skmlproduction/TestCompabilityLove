  <rect x="120" y="340" width="420" height="20" rx="8" fill="#FFFFFF" opacity="0.15"/>

  <rect x="72" y="528" width="936" height="112" rx="32" fill="#FCE4EC" opacity="0.35"/>
  <rect x="200" y="570" width="360" height="24" rx="8" fill="#E7E0EC" opacity="0.6"/>

  <text x="72" y="700" class="headline">&#1058;&#1077;&#1089;&#1090;&#1099;</text>
  <text x="72" y="744" class="subtitle">&#8230;</text>

