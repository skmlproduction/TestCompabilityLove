    <path d="M-30 0 Q0 30 30 0" stroke="#410E0B" stroke-width="6" stroke-linecap="round" fill="none"/>
    <line x1="-50" y1="-50" x2="50" y2="50" stroke="#C2185B" stroke-width="8" stroke-linecap="round"/>
