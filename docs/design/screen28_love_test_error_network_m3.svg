<?xml version="1.0" encoding="UTF-8"?>
<svg width="1080" height="2400" viewBox="0 0 1080 2400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#1C1B1F" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="bgGlow" x1="100" y1="0" x2="980" y2="800" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF0F5"/>
      <stop offset="0.45" stop-color="#FFFBFE"/>
      <stop offset="1" stop-color="#FCE4EC"/>
    </linearGradient>
    <linearGradient id="heroGradient" x1="72" y1="120" x2="1008" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C2185B"/>
      <stop offset="0.5" stop-color="#E91E63"/>
      <stop offset="1" stop-color="#F8BBD0"/>
    </linearGradient>
    <style type="text/css"><![CDATA[
      .appTitle { font-family: Inter, Roboto, Arial, sans-serif; font-size: 36px; font-weight: 800; fill: #1C1B1F; }
      .section { font-family: Inter, Roboto, Arial, sans-serif; font-size: 21px; font-weight: 760; letter-spacing: 3px; fill: #C2185B; }
      .headline { font-family: Inter, Roboto, Arial, sans-serif; font-size: 44px; font-weight: 800; fill: #1C1B1F; opacity: 0.35; }
      .subtitle { font-family: Inter, Roboto, Arial, sans-serif; font-size: 28px; font-weight: 450; fill: #625B71; opacity: 0.3; }
      .errorTitle { font-family: Inter, Roboto, Arial, sans-serif; font-size: 36px; font-weight: 800; fill: #410E0B; text-anchor: middle; }
      .errorBody { font-family: Inter, Roboto, Arial, sans-serif; font-size: 28px; font-weight: 450; fill: #625B71; text-anchor: middle; }
      .buttonText { font-family: Inter, Roboto, Arial, sans-serif; font-size: 29px; font-weight: 760; fill: #FFFFFF; }
      .bannerText { font-family: Inter, Roboto, Arial, sans-serif; font-size: 24px; font-weight: 650; fill: #410E0B; }
      .caption { font-family: Inter, Roboto, Arial, sans-serif; font-size: 21px; font-weight: 470; fill: #625B71; }
    ]]></style>
  </defs>

  <rect width="1080" height="2400" fill="url(#bgGlow)"/>

  <rect x="0" y="0" width="1080" height="96" fill="#FFFBFE" opacity="0.7"/>
