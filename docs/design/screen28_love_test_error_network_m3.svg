  <text x="540" y="1290" class="errorBody">&#1058;&#1077;&#1089;&#1090;&#1099; &#1085;&#1072; &#1080;&#1084;&#1077;&#1085;&#1072; &#1088;&#1072;&#1073;&#1086;&#1090;&#1072;&#1102;&#1090; &#1086;&#1092;&#1083;&#1072;&#1081;&#1085;.</text>
  <text x="540" y="1340" class="errorBody" style="font-size: 24px; fill: #79747E;">&#1056;&#1077;&#1082;&#1083;&#1072;&#1084;&#1072; &#1080; &#1086;&#1073;&#1085;&#1086;&#1074;&#1083;&#1077;&#1085;&#1080;&#1103; &#1090;&#1088;&#1077;&#1073;&#1091;&#1102;&#1090; &#1089;&#1077;&#1090;&#1100;.</text>

