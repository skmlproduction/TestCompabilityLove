  <rect x="200" y="1540" width="680" height="72" rx="36" fill="#F3EDF7"/>
  <text x="540" y="1588" text-anchor="middle" style="font-family: Inter, Roboto, Arial, sans-serif; font-size: 26px; font-weight: 680; fill: #49454F;">&#1055;&#1088;&#1086;&#1076;&#1086;&#1083;&#1078;&#1080;&#1090;&#1100; &#1073;&#1077;&#1079; &#1089;&#1077;&#1090;&#1080;</text>

