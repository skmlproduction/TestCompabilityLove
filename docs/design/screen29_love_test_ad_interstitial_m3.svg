  <text x="540" y="1338" text-anchor="middle" style="font-family: Inter, Roboto, Arial, sans-serif; font-size: 28px; font-weight: 700; fill: #FFFFFF;">&#1059;&#1079;&#1085;&#1072;&#1090;&#1100; &#1073;&#1086;&#1083;&#1100;&#1096;&#1077;</text>

  <!-- Bottom: premium escape -->
  <rect x="48" y="1920" width="984" height="120" rx="24" fill="#C2185B" opacity="0.85"/>
  <path d="M120 1960 C120 1942 134 1930 148 1942 C162 1930 176 1942 176 1960 C176 1982 148 1998 148 1998 C148 1998 120 1982 120 1960 Z" fill="#FFFFFF" opacity="0.9"/>
  <text x="200" y="1990" class="premiumHint" style="text-anchor: start; font-size: 28px; fill: #FFFFFF;">Premium &#8212; &#1091;&#1073;&#1088;&#1072;&#1090;&#1100; &#1088;&#1077;&#1082;&#1082;&#1072;&#1084;&#1091;</text>
  <path d="M920 1980 L940 1980 L930 2000 Z" fill="#FFFFFF" transform="rotate(90 930 1990)"/>

  <text x="540" y="2120" class="caption">&#1055;&#1086;&#1082;&#1072;&#1079;&#1099;&#1074;&#1072;&#1077;&#1090;&#1089;&#1103; &#1084;&#1077;&#1078;&#1076;&#1091; &#1089;&#1077;&#1089;&#1089;&#1080;&#1103;&#1084;&#1080; (&#1085;&#1077; &#1085;&#1072; splash)</text>
  <text x="540" y="2160" class="caption">&#1057;&#1082;&#1088;&#1086;&#1083;&#1083; &#1076;&#1086;&#1089;&#1090;&#1091;&#1087;&#1077;&#1085; &#1087;&#1086;&#1089;&#1083;&#1077; &#1090;&#1072;&#1081;&#1084;&#1077;&#1088;&#1072;</text>
</svg>
