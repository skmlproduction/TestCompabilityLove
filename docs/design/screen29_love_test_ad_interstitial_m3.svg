<?xml version="1.0" encoding="UTF-8"?>
<svg width="1080" height="2400" viewBox="0 0 1080 2400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
    <style type="text/css"><![CDATA[
      .section { font-family: Inter, Roboto, Arial, sans-serif; font-size: 21px; font-weight: 760; letter-spacing: 3px; fill: #FFFFFF; opacity: 0.5; }
      .adLabel { font-family: Inter, Roboto, Arial, sans-serif; font-size: 22px; font-weight: 700; fill: #FFFFFF; letter-spacing: 2px; }
      .placeholderTitle { font-family: Inter, Roboto, Arial, sans-serif; font-size: 36px; font-weight: 700; fill: #49454F; text-anchor: middle; }
      .placeholderSub { font-family: Inter, Roboto, Arial, sans-serif; font-size: 26px; font-weight: 450; fill: #79747E; text-anchor: middle; }
      .closeText { font-family: Inter, Roboto, Arial, sans-serif; font-size: 24px; font-weight: 700; fill: #FFFFFF; }
      .countdown { font-family: Inter, Roboto, Arial, sans-serif; font-size: 22px; font-weight: 600; fill: #FFFFFF; opacity: 0.85; }
      .premiumHint { font-family: Inter, Roboto, Arial, sans-serif; font-size: 26px; font-weight: 680; fill: #F8BBD0; text-anchor: middle; }
      .caption { font-family: Inter, Roboto, Arial, sans-serif; font-size: 20px; font-weight: 450; fill: #FFFFFF; text-anchor: middle; opacity: 0.45; }
    ]]></style>
  </defs>

  <!-- Fullscreen interstitial backdrop -->
  <rect width="1080" height="2400" fill="#1C1B1F"/>

  <rect x="0" y="0" width="1080" height="96" fill="#000000" opacity="0.25"/>
  <text x="78" y="62" style="font-family: Inter, Roboto, Arial, sans-serif; font-size: 21px; fill: #FFFFFF; opacity: 0.6;">9:41</text>

  <text x="72" y="160" class="section">EKRAN 29 / AD INTERSTITIAL</text>

