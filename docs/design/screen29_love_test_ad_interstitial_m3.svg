  <rect x="780" y="112" width="252" height="56" rx="28" fill="#49454F" opacity="0.9"/>
  <text x="906" y="148" text-anchor="middle" class="closeText">&#1047;&#1072;&#1082;&#1088;&#1099;&#1090;&#1100; 5</text>

  <!-- Main ad creative area (placeholder) -->
  <rect x="48" y="200" width="984" height="1680" rx="16" fill="#E7E0EC" filter="url(#cardShadow)"/>

  <rect x="48" y="200" width="984" height="1680" rx="16" fill="none" stroke="#CAC4D0" stroke-width="4" stroke-dasharray="16 12"/>

  <g transform="translate(540 900)">
    <rect x="-200" y="-120" width="400" height="240" rx="24" fill="#CAC4D0"/>
    <rect x="-160" y="-80" width="120" height="120" rx="16" fill="#E7E0EC"/>
    <rect x="-20" y="-40" width="200" height="24" rx="8" fill="#E7E0EC"/>
    <rect x="-20" y="0" width="160" height="24" rx="8" fill="#E7E0EC"/>
    <rect x="-20" y="40" width="120" height="24" rx="8" fill="#E7E0EC"/>
  </g>

  <text x="540" y="1100" class="placeholderTitle">&#1052;&#1077;&#1078;&#1089;&#1090;&#1088;&#1072;&#1085;&#1080;&#1095;&#1085;&#1072;&#1103; &#1088;&#1077;&#1082;&#1083;&#1072;&#1084;&#1072;</text>
  <text x="540" y="1160" class="placeholderSub">984 x 1680 &#183; AdMob mediation</text>
  <text x="540" y="1220" class="placeholderSub">&#1052;&#1072;&#1082;&#1077;&#1090; Store / QA</text>

