<?xml version="1.0" encoding="UTF-8"?>
<svg width="1080" height="2400" viewBox="0 0 1080 2400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#1C1B1F" flood-opacity="0.08"/>
      <feDropShadow dx="0" dy="2" stdDeviation="7" flood-color="#00796B" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="bgGlow" x1="100" y1="0" x2="980" y2="700" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E0F2F1"/>
      <stop offset="0.5" stop-color="#FFFBFE"/>
      <stop offset="1" stop-color="#FCE4EC"/>
    </linearGradient>
    <linearGradient id="heroGradient" x1="72" y1="200" x2="1008" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#004D40"/>
      <stop offset="0.45" stop-color="#00796B"/>
      <stop offset="1" stop-color="#80CBC4"/>
    </linearGradient>
    <style type="text/css"><![CDATA[
      .section { font-family: Inter, Roboto, Arial, sans-serif; font-size: 21px; font-weight: 760; letter-spacing: 3px; fill: #00796B; }
      .headline { font-family: Inter, Roboto, Arial, sans-serif; font-size: 48px; font-weight: 800; letter-spacing: -1px; fill: #1C1B1F; }
      .heroTitle { font-family: Inter, Roboto, Arial, sans-serif; font-size: 36px; font-weight: 830; fill: #FFFFFF; }
      .heroBody { font-family: Inter, Roboto, Arial, sans-serif; font-size: 24px; font-weight: 450; fill: #FFFFFF; opacity: 0.92; }
      .fieldLabel { font-family: Inter, Roboto, Arial, sans-serif; font-size: 24px; font-weight: 650; fill: #00796B; }
      .fieldText { font-family: Inter, Roboto, Arial, sans-serif; font-size: 32px; font-weight: 520; fill: #1C1B1F; }
      .fieldHint { font-family: Inter, Roboto, Arial, sans-serif; font-size: 22px; font-weight: 450; fill: #625B71; }
      .stepNum { font-family: Inter, Roboto, Arial, sans-serif; font-size: 22px; font-weight: 800; fill: #00796B; text-anchor: middle; }
      .stepText { font-family: Inter, Roboto, Arial, sans-serif; font-size: 22px; font-weight: 600; fill: #1C1B1F; }
      .buttonText { font-family: Inter, Roboto, Arial, sans-serif; font-size: 29px; font-weight: 760; fill: #FFFFFF; }
      .body { font-family: Inter, Roboto, Arial, sans-serif; font-size: 26px; font-weight: 450; fill: #004D40; }
      .caption { font-family: Inter, Roboto, Arial, sans-serif; font-size: 21px; font-weight: 470; fill: #625B71; }
      .backText { font-family: Inter, Roboto, Arial, sans-serif; font-size: 28px; font-weight: 680; fill: #00796B; }
    ]]></style>
  </defs>

  <rect width="1080" height="2400" fill="url(#bgGlow)"/>
  <circle cx="880" cy="180" r="160" fill="#B2DFDB" opacity="0.45"/>
  <circle cx="120" cy="1900" r="200" fill="#FCE4EC" opacity="0.3"/>

  <rect x="0" y="0" width="1080" height="96" fill="#FFFBFE" opacity="0.72"/>
  <text x="78" y="62" class="caption" fill="#1C1B1F">9:41</text>
  <rect x="892" y="43" width="58" height="22" rx="8" stroke="#1C1B1F" stroke-width="3" opacity="0.72"/>
  <rect x="955" y="49" width="6" height="10" rx="3" fill="#1C1B1F" opacity="0.72"/>
  <rect x="900" y="49" width="40" height="10" rx="5" fill="#1C1B1F" opacity="0.72"/>

  <g transform="translate(72 140)">
    <path d="M48 24 L12 24 L30 6 Z" fill="#00796B" transform="rotate(-90 30 15)"/>
    <text x="72" y="36" class="backText">&#1053;&#1072;&#1079;&#1072;&#1076;</text>
  </g>
  <text x="540" y="176" text-anchor="middle" class="headline" style="font-size: 34px;">&#1055;&#1088;&#1086;&#1090;&#1086;&#1082;&#1086;&#1083; &#1083;&#1102;&#1073;&#1074;&#1080;</text>
  <text x="72" y="228" class="section">EKRAN 30 / PROTOCOL INPUT</text>

  <!-- Hero -->
  <rect x="72" y="260" width="936" height="220" rx="46" fill="url(#heroGradient)" filter="url(#cardShadow)"/>
  <rect x="760" y="300" width="200" height="140" rx="16" fill="#FFFFFF" opacity="0.15"/>
  <rect x="780" y="320" width="160" height="12" rx="4" fill="#FFFFFF" opacity="0.4"/>
  <rect x="780" y="344" width="120" height="12" rx="4" fill="#FFFFFF" opacity="0.3"/>
  <rect x="780" y="368" width="140" height="12" rx="4" fill="#FFFFFF" opacity="0.35"/>
  <circle cx="800" cy="410" r="10" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="800" cy="440" r="10" fill="#FFFFFF" opacity="0.4"/>
  <circle cx="800" cy="470" r="10" fill="#FFFFFF" opacity="0.5"/>
  <text x="120" y="340" class="heroTitle">&#1055;&#1086;&#1096;&#1072;&#1075;&#1086;&#1074;&#1099;&#1081; &#1090;&#1077;&#1089;&#1090;</text>
  <text x="120" y="388" class="heroBody">&#1057;&#1086;&#1073;&#1077;&#1088;&#1105;&#1084; &#1089;&#1080;&#1075;&#1085;&#1072;&#1083;&#1099; &#1080; &#1074;&#1099;&#1076;&#1072;&#1105;&#1084;</text>
  <text x="120" y="420" class="heroBody">&#1087;&#1077;&#1088;&#1089;&#1086;&#1085;&#1072;&#1083;&#1100;&#1085;&#1099;&#1081; &#1087;&#1088;&#1086;&#1090;&#1086;&#1082;&#1086;&#1083;.</text>
  <rect x="760" y="440" width="180" height="44" rx="22" fill="#FFFFFF" opacity="0.22"/>
  <text x="850" y="472" text-anchor="middle" style="font-family: Inter, Roboto, Arial, sans-serif; font-size: 22px; font-weight: 760; fill: #FFFFFF;">&#1058;&#1077;&#1089;&#1090; &#8470;8</text>

  <!-- Steps preview -->
  <rect x="72" y="520" width="936" height="120" rx="32" fill="#FFFBFE" filter="url(#cardShadow)"/>
  <circle cx="160" cy="580" r="28" fill="#E0F2F1"/>
  <text x="160" y="588" class="stepNum">1</text>
  <text x="220" y="588" class="stepText">&#1064;&#1072;&#1075;&#1080;</text>
  <circle cx="400" cy="580" r="28" fill="#E0F2F1"/>
  <text x="400" y="588" class="stepNum">2</text>
  <text x="460" y="588" class="stepText">&#1057;&#1080;&#1075;&#1085;&#1072;&#1083;&#1099;</text>
  <circle cx="640" cy="580" r="28" fill="#E0F2F1"/>
  <text x="640" y="588" class="stepNum">3</text>
  <text x="700" y="588" class="stepText">&#1042;&#1077;&#1088;&#1076;&#1080;&#1082;&#1090;</text>

  <!-- Form -->
  <rect x="72" y="680" width="936" height="560" rx="38" fill="#FFFBFE" filter="url(#cardShadow)"/>

  <text x="120" y="760" class="fieldLabel">&#1042;&#1072;&#1096;&#1077; &#1080;&#1084;&#1103;</text>
  <rect x="120" y="780" width="840" height="96" rx="28" fill="#FFFFFF" stroke="#00796B" stroke-width="3"/>
  <text x="152" y="842" class="fieldText">&#1045;&#1083;&#1077;&#1085;&#1072;</text>

  <text x="120" y="940" class="fieldLabel">&#1048;&#1084;&#1103; &#1087;&#1072;&#1088;&#1090;&#1085;&#1105;&#1088;&#1072;</text>
  <rect x="120" y="960" width="840" height="96" rx="28" fill="#FFFFFF" stroke="#CAC4D0" stroke-width="2"/>
  <text x="152" y="1022" class="fieldHint">&#1053;&#1072;&#1087;&#1088;&#1080;&#1084;&#1077;&#1088;, &#1040;&#1088;&#1090;&#1105;&#1084;&#8230;</text>

  <rect x="120" y="1100" width="840" height="100" rx="24" fill="#E0F2F1"/>
  <text x="152" y="1150" class="body">&#1055;&#1088;&#1086;&#1090;&#1086;&#1082;&#1086;&#1083; &#1089;&#1090;&#1088;&#1086;&#1080;&#1090;&#1089;&#1103; &#1083;&#1086;&#1082;&#1072;&#1083;&#1100;&#1085;&#1086;, &#1073;&#1077;&#1079; &#1089;&#1077;&#1088;&#1074;&#1077;&#1088;&#1072;.</text>

  <!-- CTA -->
  <rect x="72" y="1300" width="936" height="96" rx="48" fill="#00796B" filter="url(#cardShadow)"/>
  <text x="540" y="1358" text-anchor="middle" class="buttonText">&#1047;&#1072;&#1087;&#1091;&#1089;&#1090;&#1080;&#1090;&#1100; &#1087;&#1088;&#1086;&#1090;&#1086;&#1082;&#1086;&#1083;</text>

  <text x="540" y="1440" text-anchor="middle" class="caption">&#1056;&#1077;&#1079;&#1091;&#1083;&#1100;&#1090;&#1072;&#1090; &#1090;&#1086;&#1083;&#1100;&#1082;&#1086; &#1076;&#1083;&#1103; &#1088;&#1072;&#1079;&#1074;&#1083;&#1077;&#1095;&#1077;&#1085;&#1080;&#1103;.</text>
</svg>
