      <stop offset="0.45" stop-color="#FFFBFE"/>
      <stop offset="1" stop-color="#FCE4EC"/>
    </linearGradient>
    <linearGradient id="heroGradient" x1="72" y1="120" x2="1008" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C2185B"/>
      <stop offset="0.5" stop-color="#E91E63"/>
      <stop offset="1" stop-color="#F8BBD0"/>
    </linearGradient>
    <style type="text/css"><![CDATA[
      .appTitle { font-family: Inter, Roboto, Arial, sans-serif; font-size: 36px; font-weight: 800; fill: #1C1B1F; }
      .section { font-family: Inter, Roboto, Arial, sans-serif; font-size: 21px; font-weight: 760; letter-spacing: 3px; fill: #C2185B; }
      .localeChip { font-family: Inter, Roboto, Arial, sans-serif; font-size: 18px; font-weight: 800; fill: #FFFFFF; }
      .headline { font-family: Inter, Roboto, Arial, sans-serif; font-size: 44px; font-weight: 800; letter-spacing: -0.8px; fill: #1C1B1F; }
      .subtitle { font-family: Inter, Roboto, Arial, sans-serif; font-size: 26px; font-weight: 450; fill: #625B71; }
      .heroTitle { font-family: Inter, Roboto, Arial, sans-serif; font-size: 40px; font-weight: 830; fill: #FFFFFF; }
      .heroBody { font-family: Inter, Roboto, Arial, sans-serif; font-size: 26px; font-weight: 450; fill: #FFFFFF; opacity: 0.92; }
      .cardTitle { font-family: Inter, Roboto, Arial, sans-serif; font-size: 26px; font-weight: 740; fill: #1C1B1F; }
      .cardTitleLight { font-family: Inter, Roboto, Arial, sans-serif; font-size: 30px; font-weight: 800; fill: #FFFFFF; }
      .cardCaption { font-family: Inter, Roboto, Arial, sans-serif; font-size: 19px; font-weight: 470; fill: #625B71; }
      .cardCaptionLight { font-family: Inter, Roboto, Arial, sans-serif; font-size: 21px; font-weight: 450; fill: #FFFFFF; opacity: 0.9; }
      .caption { font-family: Inter, Roboto, Arial, sans-serif; font-size: 21px; font-weight: 470; fill: #625B71; }
      .premiumText { font-family: Inter, Roboto, Arial, sans-serif; font-size: 26px; font-weight: 720; fill: #880E4F; }
