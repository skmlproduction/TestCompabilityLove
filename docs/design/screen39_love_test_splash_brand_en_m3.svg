      .caption { font-family: Inter, Roboto, Arial, sans-serif; font-size: 21px; font-weight: 470; fill: #625B71; text-anchor: middle; }
      .heroKicker { font-family: Inter, Roboto, Arial, sans-serif; font-size: 23px; font-weight: 780; letter-spacing: 3px; fill: #FFFFFF; opacity: 0.9; text-anchor: middle; }
      .heroTitle { font-family: Inter, Roboto, Arial, sans-serif; font-size: 40px; font-weight: 830; letter-spacing: -0.5px; fill: #FFFFFF; text-anchor: middle; }
      .loadingLabel { font-family: Inter, Roboto, Arial, sans-serif; font-size: 25px; font-weight: 600; fill: #880E4F; text-anchor: middle; }
      .chipText { font-family: Inter, Roboto, Arial, sans-serif; font-size: 22px; font-weight: 680; fill: #880E4F; text-anchor: middle; }
