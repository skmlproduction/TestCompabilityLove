    <path d="M0 64 C0 24 -44 -8 -76 28 C-108 -8 -152 24 -152 64 C-152 120 -76 176 0 224 C76 176 152 120 152 64 C152 24 108 -8 76 28 C44 -8 0 24 0 64 Z" fill="#FFFFFF" opacity="0.95"/>
