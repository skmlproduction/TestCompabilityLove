  <text x="120" y="2004" class="title" fill="#880E4F">Start right away</text>
  <text x="120" y="2052" style="font-family: Inter, Roboto, Arial, sans-serif; font-size: 25px; font-weight: 450; fill: #880E4F; opacity: 0.84;">Names stay on your device. No account needed.</text>

  <rect x="72" y="2172" width="936" height="88" rx="44" fill="#C2185B"/>
