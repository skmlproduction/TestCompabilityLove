  <text x="120" y="584" class="heroTitle" style="font-size: 44px;">favorite mode</text>
  <text x="120" y="660" class="heroBody">Love test, calculator,</text>
  <text x="120" y="698" class="heroBody">zodiac, wheel and more.</text>
  <rect x="120" y="760" width="260" height="56" rx="28" fill="#FFFFFF" opacity="0.2"/>
  <text x="144" y="796" style="font-family: Inter, Roboto, Arial, sans-serif; font-size: 23px; font-weight: 760; fill: #FFFFFF;">Page 2 of 3</text>

  <text x="72" y="940" class="headline">All tests in one app</text>
  <text x="72" y="998" class="body">Check yourself, your partner or friends -</text>
  <text x="72" y="1038" class="body">each mode gives its own result.</text>

  <rect x="72" y="1100" width="450" height="200" rx="32" fill="#FFFBFE" filter="url(#cardShadow)"/>
  <rect x="108" y="1140" width="64" height="64" rx="20" fill="#FCE4EC"/>
  <path d="M124 1172 C124 1160 136 1152 148 1160 C160 1152 172 1160 172 1172 C172 1188 148 1204 148 1204 C148 1204 124 1188 124 1172 Z" fill="#C2185B"/>
  <text x="196" y="1188" class="cardTitle">Love test</text>
  <text x="196" y="1228" class="cardCaption">Two names</text>

  <rect x="558" y="1100" width="450" height="200" rx="32" fill="#FFFBFE" filter="url(#cardShadow)"/>
  <rect x="594" y="1140" width="64" height="64" rx="20" fill="#FCE4EC"/>
  <text x="682" y="1172" style="font-family: Inter, Roboto, Arial, sans-serif; font-size: 32px; font-weight: 700; fill: #C2185B;">%</text>
  <text x="682" y="1188" class="cardTitle">Calculator</text>
  <text x="682" y="1228" class="cardCaption">Quick %</text>

  <rect x="72" y="1328" width="450" height="200" rx="32" fill="#FFFBFE" filter="url(#cardShadow)"/>
  <rect x="108" y="1368" width="64" height="64" rx="20" fill="#FCE4EC"/>
  <circle cx="140" cy="1400" r="22" fill="none" stroke="#C2185B" stroke-width="5"/>
  <text x="196" y="1416" class="cardTitle">Couple</text>
  <text x="196" y="1456" class="cardCaption">Compatibility</text>

  <rect x="558" y="1328" width="450" height="200" rx="32" fill="#FFFBFE" filter="url(#cardShadow)"/>
  <rect x="594" y="1368" width="64" height="64" rx="20" fill="#FCE4EC"/>
  <path d="M610 1392 L640 1372 L670 1392 L640 1428 Z" fill="#C2185B"/>
  <text x="682" y="1416" class="cardTitle">Victory</text>
  <text x="682" y="1456" class="cardCaption">In love</text>

  <rect x="72" y="1556" width="450" height="200" rx="32" fill="#FFFBFE" filter="url(#cardShadow)"/>
  <rect x="108" y="1596" width="64" height="64" rx="20" fill="#FCE4EC"/>
  <text x="128" y="1642" style="font-family: Inter, Roboto, Arial, sans-serif; font-size: 28px; font-weight: 800; fill: #C2185B;">Aa</text>
  <text x="196" y="1644" class="cardTitle">By letters</text>
  <text x="196" y="1684" class="cardCaption">Hidden symbols</text>

  <rect x="558" y="1556" width="450" height="200" rx="32" fill="#FFFBFE" filter="url(#cardShadow)"/>
  <rect x="594" y="1596" width="64" height="64" rx="20" fill="#FCE4EC"/>
  <circle cx="626" cy="1628" r="20" fill="none" stroke="#C2185B" stroke-width="5"/>
  <path d="M626 1612 L626 1600 M626 1656 L626 1668 M602 1628 L590 1628 M650 1628 L662 1628" stroke="#C2185B" stroke-width="4" stroke-linecap="round"/>
  <text x="682" y="1644" class="cardTitle">Wheel</text>
  <text x="682" y="1684" class="cardCaption">Random pick</text>

  <rect x="72" y="1784" width="936" height="160" rx="32" fill="#FCE4EC" filter="url(#cardShadow)"/>
  <circle cx="140" cy="1864" r="36" fill="#FFFFFF"/>
  <circle cx="140" cy="1864" r="24" fill="none" stroke="#C2185B" stroke-width="5"/>
  <text x="200" y="1856" class="cardTitle" fill="#880E4F">Zodiac</text>
  <text x="200" y="1896" class="cardCaption" fill="#880E4F">Pick two signs and compare compatibility</text>

  <rect x="72" y="2172" width="936" height="88" rx="44" fill="#C2185B"/>
  <text x="540" y="2228" text-anchor="middle" class="buttonText">Next</text>
  <circle cx="486" cy="2330" r="9" fill="#CAC4D0"/>
  <circle cx="540" cy="2330" r="9" fill="#C2185B"/>
  <circle cx="594" cy="2330" r="9" fill="#CAC4D0"/>
