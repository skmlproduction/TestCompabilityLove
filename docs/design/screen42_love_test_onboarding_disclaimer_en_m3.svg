<?xml version="1.0" encoding="UTF-8"?>
<svg width="1080" height="2400" viewBox="0 0 1080 2400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#1C1B1F" flood-opacity="0.08"/>
      <feDropShadow dx="0" dy="2" stdDeviation="7" flood-color="#C2185B" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="bgGlow" x1="132" y1="0" x2="988" y2="850" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF0F5"/>
      <stop offset="0.45" stop-color="#FFFBFE"/>
      <stop offset="1" stop-color="#FCE4EC"/>
    </linearGradient>
    <linearGradient id="heroGradient" x1="72" y1="380" x2="1008" y2="1100" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C2185B"/>
      <stop offset="0.52" stop-color="#E91E63"/>
      <stop offset="1" stop-color="#F8BBD0"/>
    </linearGradient>
    <style type="text/css"><![CDATA[
      .appTitle { font-family: Inter, Roboto, Arial, sans-serif; font-size: 34px; font-weight: 760; fill: #1C1B1F; }
      .skip { font-family: Inter, Roboto, Arial, sans-serif; font-size: 27px; font-weight: 680; fill: #C2185B; }
      .section { font-family: Inter, Roboto, Arial, sans-serif; font-size: 21px; font-weight: 760; letter-spacing: 3px; fill: #C2185B; }
      .localeChip { font-family: Inter, Roboto, Arial, sans-serif; font-size: 18px; font-weight: 800; fill: #FFFFFF; }
      .heroKicker { font-family: Inter, Roboto, Arial, sans-serif; font-size: 23px; font-weight: 780; letter-spacing: 3px; fill: #FFFFFF; opacity: 0.88; }
      .heroTitle { font-family: Inter, Roboto, Arial, sans-serif; font-size: 44px; font-weight: 830; letter-spacing: -1px; fill: #FFFFFF; }
      .headline { font-family: Inter, Roboto, Arial, sans-serif; font-size: 44px; font-weight: 800; letter-spacing: -0.8px; fill: #1C1B1F; }
      .title { font-family: Inter, Roboto, Arial, sans-serif; font-size: 28px; font-weight: 740; fill: #1C1B1F; }
      .caption { font-family: Inter, Roboto, Arial, sans-serif; font-size: 21px; font-weight: 470; fill: #625B71; }
      .buttonText { font-family: Inter, Roboto, Arial, sans-serif; font-size: 29px; font-weight: 760; fill: #FFFFFF; }
      .warnTitle { font-family: Inter, Roboto, Arial, sans-serif; font-size: 28px; font-weight: 760; fill: #410E0B; }
      .warnBody { font-family: Inter, Roboto, Arial, sans-serif; font-size: 25px; font-weight: 450; fill: #410E0B; opacity: 0.88; }
    ]]></style>
  </defs>

  <rect width="1080" height="2400" fill="url(#bgGlow)"/>
  <circle cx="888" cy="168" r="246" fill="#FCE4EC" opacity="0.5"/>
  <circle cx="126" cy="826" r="204" fill="#F8BBD0" opacity="0.2"/>
  <circle cx="978" cy="2050" r="314" fill="#FCE4EC" opacity="0.32"/>

  <rect x="0" y="0" width="1080" height="96" fill="#FFFBFE" opacity="0.68"/>
  <text x="78" y="62" class="caption" fill="#1C1B1F">9:41</text>
  <rect x="892" y="43" width="58" height="22" rx="8" stroke="#1C1B1F" stroke-width="3" opacity="0.72"/>
  <rect x="955" y="49" width="6" height="10" rx="3" fill="#1C1B1F" opacity="0.72"/>
  <rect x="900" y="49" width="40" height="10" rx="5" fill="#1C1B1F" opacity="0.72"/>

  <text x="72" y="176" class="appTitle">Love Tester</text>
  <rect x="720" y="132" width="72" height="40" rx="20" fill="#C2185B"/>
  <text x="756" y="160" text-anchor="middle" class="localeChip">EN</text>
  <text x="906" y="176" class="skip">Skip</text>

  <rect x="72" y="238" width="936" height="12" rx="6" fill="#E7E0EC"/>
  <rect x="72" y="238" width="936" height="12" rx="6" fill="#C2185B"/>
  <text x="72" y="302" class="section">EKRAN 42 / ONBOARDING DISCLAIMER EN</text>

  <rect x="72" y="340" width="936" height="480" rx="54" fill="url(#heroGradient)" filter="url(#cardShadow)"/>
  <circle cx="800" cy="500" r="100" fill="#FFFFFF" opacity="0.12"/>
  <g transform="translate(540 560)">
    <rect x="-56" y="-56" width="112" height="112" rx="32" fill="#FFFFFF" opacity="0.22"/>
    <text x="0" y="12" text-anchor="middle" style="font-family: Inter, Roboto, Arial, sans-serif; font-size: 56px; font-weight: 800; fill: #FFFFFF;">!</text>
  </g>
  <text x="120" y="680" class="heroKicker">IMPORTANT</text>
  <text x="120" y="748" class="heroTitle">For entertainment</text>
  <text x="120" y="808" class="heroTitle" style="font-size: 40px;">only</text>
  <rect x="120" y="860" width="260" height="56" rx="28" fill="#FFFFFF" opacity="0.2"/>
  <text x="144" y="896" style="font-family: Inter, Roboto, Arial, sans-serif; font-size: 23px; font-weight: 760; fill: #FFFFFF;">Page 3 of 3</text>

  <text x="72" y="920" class="headline">Before you start</text>

  <rect x="72" y="1000" width="936" height="420" rx="38" fill="#F9DEDC" filter="url(#cardShadow)"/>
  <rect x="120" y="1056" width="72" height="72" rx="22" fill="#FFFFFF"/>
  <circle cx="156" cy="1092" r="28" fill="none" stroke="#C2185B" stroke-width="6"/>
  <text x="156" y="1104" text-anchor="middle" style="font-family: Inter, Roboto, Arial, sans-serif; font-size: 40px; font-weight: 800; fill: #C2185B;">!</text>
  <text x="216" y="1096" class="warnTitle">Results are for fun</text>
  <text x="216" y="1136" class="warnTitle" style="font-size: 22px;">entertainment purposes only</text>
  <text x="120" y="1200" class="warnBody">Percentages and messages are not scientific</text>
  <text x="120" y="1240" class="warnBody">or professional advice. This is a game,</text>
  <text x="120" y="1280" class="warnBody">not a prediction about your relationship.</text>

  <rect x="72" y="1460" width="450" height="280" rx="38" fill="#FFFBFE" filter="url(#cardShadow)"/>
  <circle cx="120" cy="1520" r="16" fill="#C2185B"/>
  <path d="M112 1520 L118 1526 L130 1512" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" fill="none"/>
  <text x="156" y="1528" class="title">You can</text>
  <text x="108" y="1580" class="caption">Share with friends</text>
  <text x="108" y="1620" class="caption">Try different names</text>
  <text x="108" y="1660" class="caption">Have fun and play</text>

  <rect x="558" y="1460" width="450" height="280" rx="38" fill="#FFFBFE" filter="url(#cardShadow)"/>
  <circle cx="606" cy="1520" r="16" fill="#CAC4D0"/>
  <path d="M598 1512 L614 1528 M614 1512 L598 1528" stroke="#625B71" stroke-width="4" stroke-linecap="round"/>
  <text x="642" y="1528" class="title">Please don't</text>
  <text x="594" y="1580" class="caption">Treat results as truth</text>
  <text x="594" y="1620" class="caption">Make big life decisions</text>
  <text x="594" y="1660" class="caption">Rely on the numbers alone</text>

  <rect x="72" y="1780" width="936" height="200" rx="38" fill="#FCE4EC" filter="url(#cardShadow)"/>
  <text x="120" y="1858" class="section" fill="#880E4F">AGREEMENT</text>
  <text x="120" y="1914" class="title" fill="#880E4F">By tapping Get started, you agree</text>
  <text x="120" y="1954" style="font-family: Inter, Roboto, Arial, sans-serif; font-size: 24px; font-weight: 450; fill: #880E4F; opacity: 0.9;">you understand this app is for entertainment only.</text>

  <rect x="72" y="2172" width="936" height="88" rx="44" fill="#C2185B"/>
  <text x="540" y="2228" text-anchor="middle" class="buttonText">Get started</text>
  <circle cx="486" cy="2330" r="9" fill="#CAC4D0"/>
  <circle cx="540" cy="2330" r="9" fill="#CAC4D0"/>
  <circle cx="594" cy="2330" r="9" fill="#C2185B"/>
</svg>
