<?xml version="1.0" encoding="UTF-8"?>
<svg width="1080" height="2400" viewBox="0 0 1080 2400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#1C1B1F" flood-opacity="0.08"/>
      <feDropShadow dx="0" dy="2" stdDeviation="7" flood-color="#C2185B" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="bgGlow" x1="100" y1="0" x2="980" y2="700" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF0F5"/>
      <stop offset="0.5" stop-color="#FFFBFE"/>
      <stop offset="1" stop-color="#FCE4EC"/>
    </linearGradient>
    <linearGradient id="heroGradient" x1="72" y1="200" x2="1008" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C2185B"/>
      <stop offset="0.55" stop-color="#E91E63"/>
      <stop offset="1" stop-color="#F8BBD0"/>
    </linearGradient>
    <style type="text/css"><![CDATA[
      .section { font-family: Inter, Roboto, Arial, sans-serif; font-size: 21px; font-weight: 760; letter-spacing: 3px; fill: #C2185B; }
      .localeChip { font-family: Inter, Roboto, Arial, sans-serif; font-size: 18px; font-weight: 800; fill: #FFFFFF; }
      .headline { font-family: Inter, Roboto, Arial, sans-serif; font-size: 40px; font-weight: 800; letter-spacing: -0.5px; fill: #1C1B1F; text-anchor: middle; }
      .body { font-family: Inter, Roboto, Arial, sans-serif; font-size: 26px; font-weight: 450; fill: #625B71; }
      .heroTitle { font-family: Inter, Roboto, Arial, sans-serif; font-size: 36px; font-weight: 830; fill: #FFFFFF; }
      .heroBody { font-family: Inter, Roboto, Arial, sans-serif; font-size: 24px; font-weight: 450; fill: #FFFFFF; opacity: 0.9; }
      .fieldLabel { font-family: Inter, Roboto, Arial, sans-serif; font-size: 24px; font-weight: 650; fill: #C2185B; }
      .fieldText { font-family: Inter, Roboto, Arial, sans-serif; font-size: 32px; font-weight: 520; fill: #1C1B1F; }
      .fieldHint { font-family: Inter, Roboto, Arial, sans-serif; font-size: 22px; font-weight: 450; fill: #625B71; }
      .buttonText { font-family: Inter, Roboto, Arial, sans-serif; font-size: 29px; font-weight: 760; fill: #FFFFFF; }
      .caption { font-family: Inter, Roboto, Arial, sans-serif; font-size: 21px; font-weight: 470; fill: #625B71; }
      .backText { font-family: Inter, Roboto, Arial, sans-serif; font-size: 28px; font-weight: 680; fill: #C2185B; }
    ]]></style>
  </defs>

  <rect width="1080" height="2400" fill="url(#bgGlow)"/>
  <circle cx="880" cy="160" r="200" fill="#F8BBD0" opacity="0.4"/>
  <circle cx="140" cy="1900" r="240" fill="#FCE4EC" opacity="0.35"/>

  <rect x="0" y="0" width="1080" height="96" fill="#FFFBFE" opacity="0.72"/>
  <text x="78" y="62" class="caption" fill="#1C1B1F">9:41</text>
  <rect x="892" y="43" width="58" height="22" rx="8" stroke="#1C1B1F" stroke-width="3" opacity="0.72"/>
  <rect x="955" y="49" width="6" height="10" rx="3" fill="#1C1B1F" opacity="0.72"/>
  <rect x="900" y="49" width="40" height="10" rx="5" fill="#1C1B1F" opacity="0.72"/>

  <g transform="translate(72 140)">
    <path d="M48 24 L12 24 L30 6 Z" fill="#C2185B" transform="rotate(-90 30 15)"/>
    <text x="72" y="36" class="backText">Back</text>
  </g>
  <rect x="800" y="128" width="72" height="40" rx="20" fill="#C2185B"/>
  <text x="836" y="156" text-anchor="middle" class="localeChip">EN</text>
  <text x="540" y="176" text-anchor="middle" class="headline">Love test</text>
  <text x="72" y="228" class="section">EKRAN 43 / LOVE TEST INPUT EN</text>

  <rect x="72" y="260" width="936" height="200" rx="46" fill="url(#heroGradient)" filter="url(#cardShadow)"/>
  <path d="M148 360 C148 332 172 312 196 332 C220 312 244 332 244 360 C244 392 196 420 196 420 C196 420 148 392 148 360 Z" fill="#FFFFFF" opacity="0.95" transform="translate(760 60) scale(0.85)"/>
  <text x="120" y="340" class="heroTitle">Who is your match?</text>
  <text x="120" y="388" class="heroBody">Enter two names - we will calculate</text>
  <text x="120" y="420" class="heroBody">your compatibility percent.</text>

  <rect x="72" y="500" width="936" height="720" rx="38" fill="#FFFBFE" filter="url(#cardShadow)"/>

  <text x="120" y="580" class="fieldLabel">Your name</text>
  <rect x="120" y="600" width="840" height="96" rx="28" fill="#FFFFFF" stroke="#C2185B" stroke-width="3"/>
  <text x="152" y="662" class="fieldText">Anna</text>
  <circle cx="920" cy="648" r="20" fill="#FCE4EC"/>
  <path d="M912 648 L920 640 L928 648 L920 656 Z" fill="#C2185B" opacity="0.6"/>

  <text x="120" y="760" class="fieldLabel">Partner or friend</text>
  <rect x="120" y="780" width="840" height="96" rx="28" fill="#FFFFFF" stroke="#CAC4D0" stroke-width="2"/>
  <text x="152" y="842" class="fieldHint">e.g. Max...</text>

  <text x="120" y="940" class="fieldHint">Popular pairs:</text>
  <rect x="120" y="960" width="160" height="48" rx="24" fill="#FCE4EC"/>
  <text x="200" y="992" text-anchor="middle" class="fieldHint" fill="#880E4F">Anna + Max</text>
  <rect x="300" y="960" width="200" height="48" rx="24" fill="#FCE4EC"/>
  <text x="400" y="992" text-anchor="middle" class="fieldHint" fill="#880E4F">Emma + James</text>

  <rect x="120" y="1040" width="840" height="120" rx="24" fill="#FCE4EC"/>
  <text x="152" y="1090" class="body" fill="#880E4F">Tip: results are for entertainment only.</text>
  <text x="152" y="1130" class="caption" fill="#880E4F">We do not save names to a server.</text>

  <rect x="72" y="1280" width="936" height="96" rx="48" fill="#C2185B" filter="url(#cardShadow)"/>
  <text x="540" y="1338" text-anchor="middle" class="buttonText">Calculate love</text>

  <rect x="0" y="1520" width="1080" height="520" rx="0" fill="#F3EDF7" opacity="0.95"/>
  <line x1="0" y1="1520" x2="1080" y2="1520" stroke="#E7E0EC" stroke-width="2"/>
  <text x="540" y="1580" text-anchor="middle" class="caption">System keyboard (IME)</text>
  <rect x="48" y="1620" width="96" height="72" rx="12" fill="#FFFFFF"/>
  <rect x="160" y="1620" width="96" height="72" rx="12" fill="#FFFFFF"/>
  <rect x="272" y="1620" width="96" height="72" rx="12" fill="#FFFFFF"/>
  <rect x="384" y="1620" width="96" height="72" rx="12" fill="#FFFFFF"/>
  <rect x="496" y="1620" width="96" height="72" rx="12" fill="#FFFFFF"/>
  <rect x="608" y="1620" width="96" height="72" rx="12" fill="#FFFFFF"/>
  <rect x="720" y="1620" width="96" height="72" rx="12" fill="#FFFFFF"/>
  <rect x="832" y="1620" width="96" height="72" rx="12" fill="#FFFFFF"/>
  <rect x="936" y="1620" width="96" height="72" rx="12" fill="#C2185B" opacity="0.25"/>
  <rect x="780" y="1880" width="252" height="72" rx="16" fill="#C2185B" opacity="0.4"/>
  <text x="906" y="1928" text-anchor="middle" style="font-family: Inter, Roboto, Arial, sans-serif; font-size: 22px; font-weight: 700; fill: #FFFFFF;">Done</text>
</svg>
