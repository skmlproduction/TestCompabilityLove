<?xml version="1.0" encoding="UTF-8"?>
<svg width="1080" height="2400" viewBox="0 0 1080 2400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="40" flood-color="#1C1B1F" flood-opacity="0.2"/>
    </filter>
    <linearGradient id="shareCardBg" x1="80" y1="80" x2="920" y2="1200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C2185B"/>
      <stop offset="0.45" stop-color="#E91E63"/>
      <stop offset="1" stop-color="#F8BBD0"/>
    </linearGradient>
    <style type="text/css"><![CDATA[
      .section { font-family: Inter, Roboto, Arial, sans-serif; font-size: 21px; font-weight: 760; letter-spacing: 3px; fill: #FFFFFF; opacity: 0.7; }
      .localeChip { font-family: Inter, Roboto, Arial, sans-serif; font-size: 16px; font-weight: 800; fill: #1C1B1F; }
      .sheetTitle { font-family: Inter, Roboto, Arial, sans-serif; font-size: 32px; font-weight: 800; fill: #FFFFFF; text-anchor: middle; }
      .targetLabel { font-family: Inter, Roboto, Arial, sans-serif; font-size: 20px; font-weight: 600; fill: #FFFFFF; text-anchor: middle; opacity: 0.9; }
      .cancelText { font-family: Inter, Roboto, Arial, sans-serif; font-size: 28px; font-weight: 680; fill: #FFFFFF; text-anchor: middle; }
      .brandSmall { font-family: Inter, Roboto, Arial, sans-serif; font-size: 28px; font-weight: 800; fill: #FFFFFF; }
      .percentHuge { font-family: Inter, Roboto, Arial, sans-serif; font-size: 140px; font-weight: 800; fill: #FFFFFF; text-anchor: middle; }
      .namesCard { font-family: Inter, Roboto, Arial, sans-serif; font-size: 40px; font-weight: 740; fill: #FFFFFF; text-anchor: middle; }
      .tagline { font-family: Inter, Roboto, Arial, sans-serif; font-size: 26px; font-weight: 500; fill: #FFFFFF; text-anchor: middle; opacity: 0.92; }
      .disclaimerCard { font-family: Inter, Roboto, Arial, sans-serif; font-size: 18px; font-weight: 450; fill: #FFFFFF; text-anchor: middle; opacity: 0.75; }
    ]]></style>
  </defs>

  <rect width="1080" height="2400" fill="#1C1B1F" opacity="0.55"/>

  <rect x="0" y="0" width="1080" height="96" fill="#1C1B1F" opacity="0.3"/>
  <text x="78" y="62" style="font-family: Inter, Roboto, Arial, sans-serif; font-size: 21px; fill: #FFFFFF; opacity: 0.8;">9:41</text>

  <rect x="880" y="140" width="56" height="32" rx="16" fill="#FFFFFF" opacity="0.9"/>
  <text x="908" y="162" text-anchor="middle" class="localeChip">EN</text>
  <text x="72" y="180" class="section">EKRAN 47 / SHARE CARD EN</text>
  <text x="540" y="240" class="sheetTitle">Share your result</text>

  <rect x="80" y="300" width="920" height="1160" rx="40" fill="url(#shareCardBg)" filter="url(#cardShadow)"/>
  <circle cx="860" cy="420" r="120" fill="#FFFFFF" opacity="0.1"/>
  <circle cx="200" cy="1300" r="100" fill="#FFFFFF" opacity="0.08"/>
  <path d="M160 500 C160 470 188 450 210 470 C232 450 260 470 260 500 C260 536 210 570 210 570 C210 570 160 536 160 500 Z" fill="#FFFFFF" opacity="0.25" transform="scale(1.2) translate(600 200)"/>

  <text x="120" y="380" class="brandSmall">Love Tester</text>
  <text x="120" y="420" class="tagline" style="text-anchor: start; font-size: 22px;">Love compatibility test</text>

  <text x="540" y="720" class="percentHuge">87%</text>
  <text x="540" y="800" class="namesCard">Anna + Max</text>
  <text x="540" y="880" class="tagline">compatibility</text>

  <rect x="200" y="960" width="680" height="72" rx="32" fill="#FFFFFF" opacity="0.2"/>
  <text x="540" y="1010" class="tagline" style="font-size: 30px; font-weight: 760;">Great match!</text>

  <text x="540" y="1380" class="disclaimerCard">For entertainment only</text>
  <text x="540" y="1420" class="disclaimerCard">dev.lovetest.app</text>

  <rect x="0" y="1520" width="1080" height="520" rx="48" fill="#2B2930"/>
  <rect x="0" y="1520" width="1080" height="2" fill="#FFFFFF" opacity="0.1"/>

  <circle cx="180" cy="1640" r="48" fill="#29B6F6"/>
  <text x="180" y="1720" class="targetLabel">Telegram</text>

  <circle cx="400" cy="1640" r="48" fill="#25D366"/>
  <text x="400" y="1720" class="targetLabel">WhatsApp</text>

  <circle cx="620" cy="1640" r="48" fill="#F3EDF7"/>
  <rect x="598" y="1624" width="44" height="32" rx="6" fill="none" stroke="#C2185B" stroke-width="3"/>
  <text x="620" y="1720" class="targetLabel" fill="#E7E0EC">Copy</text>

  <circle cx="840" cy="1640" r="48" fill="#49454F"/>
  <circle cx="828" cy="1632" r="4" fill="#FFFFFF"/>
  <circle cx="840" cy="1632" r="4" fill="#FFFFFF"/>
  <circle cx="852" cy="1632" r="4" fill="#FFFFFF"/>
  <text x="840" y="1720" class="targetLabel">More</text>

  <rect x="72" y="1780" width="936" height="88" rx="44" fill="#49454F"/>
  <text x="540" y="1838" class="cancelText">Cancel</text>
</svg>
