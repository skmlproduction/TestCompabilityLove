<?xml version="1.0" encoding="UTF-8"?>
<svg width="1080" height="2400" viewBox="0 0 1080 2400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#1C1B1F" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="bgGlow" x1="100" y1="0" x2="980" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFBFE"/>
      <stop offset="0.6" stop-color="#FFFBFE"/>
      <stop offset="1" stop-color="#F5F0F2"/>
    </linearGradient>
    <linearGradient id="heroMuted" x1="72" y1="200" x2="1008" y2="700" gradientUnits="userSpaceOnUse">
      <stop stop-color="#9E9E9E"/>
      <stop offset="0.45" stop-color="#B0A8AD"/>
      <stop offset="1" stop-color="#E7E0EC"/>
    </linearGradient>
    <style type="text/css"><![CDATA[
      .section { font-family: Inter, Roboto, Arial, sans-serif; font-size: 21px; font-weight: 760; letter-spacing: 3px; fill: #C2185B; }
      .localeChip { font-family: Inter, Roboto, Arial, sans-serif; font-size: 18px; font-weight: 800; fill: #FFFFFF; }
      .headline { font-family: Inter, Roboto, Arial, sans-serif; font-size: 40px; font-weight: 800; fill: #1C1B1F; text-anchor: middle; }
      .percent { font-family: Inter, Roboto, Arial, sans-serif; font-size: 108px; font-weight: 800; fill: #625B71; text-anchor: middle; }
      .percentLabel { font-family: Inter, Roboto, Arial, sans-serif; font-size: 32px; font-weight: 700; fill: #79747E; text-anchor: middle; }
      .names { font-family: Inter, Roboto, Arial, sans-serif; font-size: 34px; font-weight: 740; fill: #FFFFFF; text-anchor: middle; }
      .resultTitle { font-family: Inter, Roboto, Arial, sans-serif; font-size: 36px; font-weight: 800; fill: #410E0B; }
      .resultBody { font-family: Inter, Roboto, Arial, sans-serif; font-size: 28px; font-weight: 450; fill: #625B71; }
      .buttonText { font-family: Inter, Roboto, Arial, sans-serif; font-size: 29px; font-weight: 760; fill: #FFFFFF; }
      .outlinedText { font-family: Inter, Roboto, Arial, sans-serif; font-size: 27px; font-weight: 680; fill: #C2185B; }
      .disclaimer { font-family: Inter, Roboto, Arial, sans-serif; font-size: 20px; font-weight: 450; fill: #625B71; text-anchor: middle; }
      .caption { font-family: Inter, Roboto, Arial, sans-serif; font-size: 21px; font-weight: 470; fill: #625B71; }
      .chipText { font-family: Inter, Roboto, Arial, sans-serif; font-size: 22px; font-weight: 700; fill: #410E0B; }
    ]]></style>
  </defs>

  <rect width="1080" height="2400" fill="url(#bgGlow)"/>

  <rect x="0" y="0" width="1080" height="96" fill="#FFFBFE" opacity="0.72"/>
  <text x="78" y="62" class="caption" fill="#1C1B1F">9:41</text>
  <rect x="892" y="43" width="58" height="22" rx="8" stroke="#1C1B1F" stroke-width="3" opacity="0.72"/>
  <rect x="955" y="49" width="6" height="10" rx="3" fill="#1C1B1F" opacity="0.72"/>
  <rect x="900" y="49" width="40" height="10" rx="5" fill="#1C1B1F" opacity="0.72"/>

  <rect x="800" y="128" width="72" height="40" rx="20" fill="#C2185B"/>
  <text x="836" y="156" text-anchor="middle" class="localeChip">EN</text>
  <text x="540" y="168" class="headline">Result</text>
  <text x="72" y="218" class="section">EKRAN 48 / RESULT LOW EN</text>

  <rect x="72" y="260" width="936" height="640" rx="48" fill="url(#heroMuted)" filter="url(#cardShadow)"/>
  <text x="500" y="360" class="names">Anna</text>
  <path d="M528 340 C528 328 540 320 548 328 C556 320 568 328 568 340 C568 356 548 372 548 372 C548 372 528 356 528 340 Z" fill="#FFFFFF" transform="translate(12 8)"/>
  <text x="580" y="360" class="names">Max</text>

  <circle cx="540" cy="580" r="150" fill="none" stroke="#FFFFFF" stroke-width="20" opacity="0.5"/>
  <path d="M540 430 A150 150 0 0 1 620 720" stroke="#FFFFFF" stroke-width="20" stroke-linecap="round" fill="none" opacity="0.7"/>
  <circle cx="540" cy="580" r="120" fill="#FFFFFF" opacity="0.15"/>

  <text x="540" y="620" class="percent">23%</text>
  <text x="540" y="680" class="percentLabel">compatibility</text>

  <rect x="200" y="760" width="680" height="80" rx="32" fill="#FFFFFF" opacity="0.25"/>
  <text x="540" y="812" text-anchor="middle" style="font-family: Inter, Roboto, Arial, sans-serif; font-size: 28px; font-weight: 760; fill: #FFFFFF;">Still room for hope</text>

  <rect x="72" y="940" width="936" height="420" rx="38" fill="#F9DEDC" filter="url(#cardShadow)"/>
  <rect x="120" y="1000" width="56" height="56" rx="16" fill="#FFFFFF"/>
  <text x="148" y="1040" text-anchor="middle" style="font-family: Inter, Roboto, Arial, sans-serif; font-size: 32px; font-weight: 800; fill: #C2185B;">!</text>
  <text x="200" y="1020" class="resultTitle">Low score</text>
  <text x="120" y="1090" class="resultBody" fill="#410E0B" opacity="0.88">Your names give a modest rhythm -</text>
  <text x="120" y="1134" class="resultBody" fill="#410E0B" opacity="0.88">that is normal for fun.</text>
  <text x="120" y="1178" class="resultBody" fill="#410E0B" opacity="0.88">Try another test or check</text>
  <text x="120" y="1222" class="resultBody" fill="#410E0B" opacity="0.88">with someone else.</text>

  <rect x="120" y="1280" width="240" height="48" rx="24" fill="#FFFFFF" opacity="0.7"/>
  <text x="240" y="1312" text-anchor="middle" class="chipText">Below 50%</text>

  <rect x="72" y="1400" width="936" height="160" rx="32" fill="#FFFBFE" filter="url(#cardShadow)"/>
  <text x="120" y="1470" class="resultTitle" fill="#1C1B1F" style="font-size: 30px;">Tip</text>
  <text x="120" y="1518" class="resultBody">Real love matters more than numbers or letters.</text>

  <rect x="72" y="1600" width="936" height="88" rx="44" fill="#C2185B" filter="url(#cardShadow)"/>
  <text x="540" y="1658" text-anchor="middle" class="buttonText">Share</text>

  <rect x="72" y="1712" width="936" height="88" rx="44" fill="none" stroke="#C2185B" stroke-width="3"/>
  <text x="540" y="1770" text-anchor="middle" class="outlinedText">Try again</text>

  <rect x="72" y="1820" width="936" height="88" rx="44" fill="#FCE4EC"/>
  <text x="540" y="1878" text-anchor="middle" style="font-family: Inter, Roboto, Arial, sans-serif; font-size: 27px; font-weight: 680; fill: #880E4F;">Back to home</text>

  <text x="540" y="1960" class="disclaimer">For entertainment only. Not a real prediction.</text>

  <g transform="translate(540 2100)" opacity="0.15">
    <path d="M-40 0 C-40 -20 -10 -36 0 -16 C10 -36 40 -20 40 0 C40 24 0 48 0 48 C0 48 -40 24 -40 0 Z" fill="#625B71"/>
    <line x1="0" y1="-10" x2="0" y2="58" stroke="#625B71" stroke-width="6"/>
  </g>
</svg>
