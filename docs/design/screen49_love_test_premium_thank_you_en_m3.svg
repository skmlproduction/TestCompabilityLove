<?xml version="1.0" encoding="UTF-8"?>
<svg width="1080" height="2400" viewBox="0 0 1080 2400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#1C1B1F" flood-opacity="0.08"/>
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#2E7D32" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="bgGlow" x1="100" y1="0" x2="980" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E8F5E9"/>
      <stop offset="0.4" stop-color="#FFFBFE"/>
      <stop offset="1" stop-color="#FFF8E1"/>
    </linearGradient>
    <linearGradient id="heroGradient" x1="72" y1="200" x2="1008" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2E7D32"/>
      <stop offset="0.35" stop-color="#C2185B"/>
      <stop offset="0.7" stop-color="#E91E63"/>
      <stop offset="1" stop-color="#FFB74D"/>
    </linearGradient>
    <linearGradient id="goldBadge" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFD54F"/>
      <stop offset="1" stop-color="#FF8F00"/>
    </linearGradient>
    <style type="text/css"><![CDATA[
      .section { font-family: Inter, Roboto, Arial, sans-serif; font-size: 21px; font-weight: 760; letter-spacing: 3px; fill: #C2185B; }
      .localeChip { font-family: Inter, Roboto, Arial, sans-serif; font-size: 18px; font-weight: 800; fill: #FFFFFF; }
      .headline { font-family: Inter, Roboto, Arial, sans-serif; font-size: 56px; font-weight: 800; fill: #1C1B1F; text-anchor: middle; }
      .heroTitle { font-family: Inter, Roboto, Arial, sans-serif; font-size: 44px; font-weight: 830; fill: #FFFFFF; text-anchor: middle; }
      .heroSub { font-family: Inter, Roboto, Arial, sans-serif; font-size: 28px; font-weight: 450; fill: #FFFFFF; text-anchor: middle; opacity: 0.95; }
      .body { font-family: Inter, Roboto, Arial, sans-serif; font-size: 30px; font-weight: 450; fill: #625B71; text-anchor: middle; }
      .cardTitle { font-family: Inter, Roboto, Arial, sans-serif; font-size: 32px; font-weight: 740; fill: #1C1B1F; }
      .cardBody { font-family: Inter, Roboto, Arial, sans-serif; font-size: 26px; font-weight: 450; fill: #625B71; }
      .buttonText { font-family: Inter, Roboto, Arial, sans-serif; font-size: 30px; font-weight: 800; fill: #FFFFFF; }
      .caption { font-family: Inter, Roboto, Arial, sans-serif; font-size: 21px; font-weight: 470; fill: #625B71; text-anchor: middle; }
    ]]></style>
  </defs>

  <rect width="1080" height="2400" fill="url(#bgGlow)"/>
  <path d="M200 360 L220 320 L240 360 L220 400 Z" fill="#FFD54F" opacity="0.5"/>
  <path d="M880 480 L900 440 L920 480 L900 520 Z" fill="#FFD54F" opacity="0.4"/>
  <path d="M160 1200 L180 1160 L200 1200 L180 1240 Z" fill="#C2185B" opacity="0.15"/>
  <circle cx="920" cy="180" r="160" fill="#C8E6C9" opacity="0.45"/>

  <rect x="0" y="0" width="1080" height="96" fill="#FFFBFE" opacity="0.72"/>
  <text x="78" y="62" class="caption" fill="#1C1B1F">9:41</text>
  <rect x="892" y="43" width="58" height="22" rx="8" stroke="#1C1B1F" stroke-width="3" opacity="0.72"/>
  <rect x="955" y="49" width="6" height="10" rx="3" fill="#1C1B1F" opacity="0.72"/>
  <rect x="900" y="49" width="40" height="10" rx="5" fill="#1C1B1F" opacity="0.72"/>

  <rect x="800" y="128" width="72" height="40" rx="20" fill="#C2185B"/>
  <text x="836" y="156" text-anchor="middle" class="localeChip">EN</text>
  <text x="72" y="210" class="section">EKRAN 49 / PREMIUM THANK YOU EN</text>

  <rect x="72" y="260" width="936" height="560" rx="48" fill="url(#heroGradient)" filter="url(#cardShadow)"/>

  <circle cx="540" cy="440" r="100" fill="#FFFFFF" opacity="0.2"/>
  <circle cx="540" cy="440" r="80" fill="#FFFFFF"/>
  <path d="M500 440 L528 468 L580 416" stroke="#2E7D32" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <g transform="translate(700 320)">
    <circle cx="0" cy="0" r="40" fill="url(#goldBadge)"/>
    <path d="M-16 -4 L0 -24 L16 -4 L12 12 L-12 12 Z" fill="#FFFFFF" opacity="0.95"/>
  </g>

  <text x="540" y="600" class="heroTitle">Thank you!</text>
  <text x="540" y="660" class="heroSub">Premium activated</text>
  <rect x="280" y="700" width="520" height="56" rx="28" fill="#FFFFFF" opacity="0.22"/>
  <text x="540" y="740" text-anchor="middle" style="font-family: Inter, Roboto, Arial, sans-serif; font-size: 24px; font-weight: 760; fill: #FFFFFF;">Purchase successful</text>

  <text x="540" y="900" class="headline">You are all set!</text>

  <rect x="72" y="980" width="936" height="360" rx="38" fill="#FFFBFE" filter="url(#cardShadow)"/>
  <text x="120" y="1060" class="cardTitle">What is next</text>
  <text x="120" y="1120" class="cardBody">Ads are off. All tests and results</text>
  <text x="120" y="1164" class="cardBody">are available without limits.</text>
  <text x="120" y="1208" class="cardBody">Enjoy the app and have fun!</text>

  <rect x="120" y="1260" width="280" height="52" rx="26" fill="#E8F5E9"/>
  <text x="260" y="1294" text-anchor="middle" style="font-family: Inter, Roboto, Arial, sans-serif; font-size: 22px; font-weight: 800; fill: #2E7D32;">Premium active</text>

  <rect x="72" y="1400" width="936" height="104" rx="52" fill="#C2185B" filter="url(#cardShadow)"/>
  <text x="540" y="1464" text-anchor="middle" class="buttonText">Back to home</text>

  <rect x="72" y="1540" width="936" height="88" rx="44" fill="#FCE4EC"/>
  <text x="540" y="1598" text-anchor="middle" style="font-family: Inter, Roboto, Arial, sans-serif; font-size: 27px; font-weight: 680; fill: #880E4F;">Take the love test</text>

  <text x="540" y="1700" class="body" style="font-size: 26px;">Supporting the app means the world in a review.</text>

  <text x="540" y="1820" text-anchor="middle" class="caption">Purchase linked to your Google account</text>
</svg>
