  <text x="540" y="1840" class="disclaimer">For entertainment only. Not a real prediction.</text>

  <rect x="72" y="1900" width="936" height="200" rx="32" fill="#FFFBFE" filter="url(#cardShadow)" stroke="#FCE4EC" stroke-width="2"/>
  <circle cx="180" cy="2000" r="48" fill="#FCE4EC"/>
  <text x="180" y="2016" class="avatarInitial" fill="#C2185B">S</text>
  <circle cx="260" cy="2000" r="48" fill="#F8BBD0"/>
  <text x="260" y="2016" class="avatarInitial" fill="#880E4F">D</text>
  <text x="340" y="1980" class="resultTitle" style="font-size: 28px;">74% - Sophia + Dmitry</text>
  <text x="340" y="2020" class="resultBody" style="font-size: 24px;">Pair compatibility - Love Tester</text>
  <text x="340" y="2060" class="caption">Share card preview</text>
</svg>
