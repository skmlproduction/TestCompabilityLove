  <circle cx="540" cy="600" r="150" fill="none" stroke="#FFFFFF" stroke-width="20" opacity="0.35"/>
  <circle cx="540" cy="600" r="150" fill="none" stroke="#FFFFFF" stroke-width="20" stroke-dasharray="700 940" stroke-linecap="round" transform="rotate(-90 540 600)"/>
  <circle cx="540" cy="600" r="120" fill="#FFFFFF" opacity="0.18"/>

  <text x="540" y="640" class="percent">74%</text>
  <text x="540" y="700" class="percentLabel">pair compatibility</text>

  <rect x="200" y="780" width="680" height="80" rx="32" fill="#FFFFFF" opacity="0.22"/>
  <text x="540" y="832" text-anchor="middle" style="font-family: Inter, Roboto, Arial, sans-serif; font-size: 28px; font-weight: 760; fill: #FFFFFF;">Great harmony</text>

  <rect x="72" y="960" width="936" height="460" rx="38" fill="#FFFBFE" filter="url(#cardShadow)"/>
  <text x="120" y="1040" class="resultTitle">Pair metrics</text>

  <text x="120" y="1110" class="metricLabel">Connection</text>
  <rect x="120" y="1124" width="760" height="16" rx="8" fill="#F3EDF7"/>
  <rect x="120" y="1124" width="608" height="16" rx="8" fill="#C2185B"/>
