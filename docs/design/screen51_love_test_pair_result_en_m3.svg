  <text x="120" y="1200" class="metricLabel">Trust</text>
  <rect x="120" y="1214" width="760" height="16" rx="8" fill="#F3EDF7"/>
  <rect x="120" y="1214" width="684" height="16" rx="8" fill="#E91E63"/>
  <text x="920" y="1230" class="metricValue">90%</text>

  <text x="120" y="1290" class="metricLabel">Passion</text>
  <rect x="120" y="1304" width="760" height="16" rx="8" fill="#F3EDF7"/>
  <rect x="120" y="1304" width="456" height="16" rx="8" fill="#F48FB1"/>
  <text x="920" y="1320" class="metricValue">60%</text>

  <text x="120" y="1380" class="resultBody">Your names match by rhythm -</text>
  <text x="120" y="1424" class="resultBody">you have a steady bond.</text>

  <rect x="120" y="1360" width="200" height="48" rx="24" fill="#FCE4EC"/>
  <text x="220" y="1392" text-anchor="middle" style="font-family: Inter, Roboto, Arial, sans-serif; font-size: 22px; font-weight: 700; fill: #880E4F;">Test #3</text>

  <rect x="72" y="1480" width="936" height="88" rx="44" fill="#C2185B" filter="url(#cardShadow)"/>
