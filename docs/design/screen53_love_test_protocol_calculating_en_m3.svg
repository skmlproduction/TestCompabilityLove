<?xml version="1.0" encoding="UTF-8"?>
<svg width="1080" height="2400" viewBox="0 0 1080 2400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#1C1B1F" flood-opacity="0.08"/>
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#00796B" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="bgGlow" x1="120" y1="0" x2="960" y2="1200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E0F2F1"/>
      <stop offset="0.4" stop-color="#FFFBFE"/>
      <stop offset="1" stop-color="#FCE4EC"/>
    </linearGradient>
    <linearGradient id="ringGradient" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#004D40"/>
      <stop offset="0.5" stop-color="#00796B"/>
      <stop offset="1" stop-color="#26A69A"/>
    </linearGradient>
    <style type="text/css"><![CDATA[
      .section { font-family: Inter, Roboto, Arial, sans-serif; font-size: 21px; font-weight: 760; letter-spacing: 3px; fill: #00796B; }
      .headline { font-family: Inter, Roboto, Arial, sans-serif; font-size: 40px; font-weight: 800; fill: #1C1B1F; text-anchor: middle; }
      .body { font-family: Inter, Roboto, Arial, sans-serif; font-size: 28px; font-weight: 450; fill: #625B71; text-anchor: middle; }
      .nameLabel { font-family: Inter, Roboto, Arial, sans-serif; font-size: 32px; font-weight: 740; fill: #1C1B1F; text-anchor: middle; }
      .calcTitle { font-family: Inter, Roboto, Arial, sans-serif; font-size: 36px; font-weight: 760; fill: #00796B; text-anchor: middle; }
      .stepText { font-family: Inter, Roboto, Arial, sans-serif; font-size: 24px; font-weight: 500; fill: #625B71; text-anchor: middle; }
      .caption { font-family: Inter, Roboto, Arial, sans-serif; font-size: 21px; font-weight: 470; fill: #625B71; text-anchor: middle; }
      .percentGhost { font-family: Inter, Roboto, Arial, sans-serif; font-size: 88px; font-weight: 800; fill: #00796B; opacity: 0.12; text-anchor: middle; }
      .localeChip { font-family: Inter, Roboto, Arial, sans-serif; font-size: 18px; font-weight: 800; fill: #FFFFFF; }
    ]]></style>
  </defs>

  <rect width="1080" height="2400" fill="url(#bgGlow)"/>

  <!-- Floating protocol chips -->
  <rect x="180" y="380" width="80" height="48" rx="24" fill="#B2DFDB" opacity="0.35"/>
  <rect x="820" y="300" width="96" height="48" rx="24" fill="#80CBC4" opacity="0.3"/>
  <circle cx="160" cy="1220" r="40" fill="#E0F2F1" opacity="0.6"/>
  <circle cx="920" cy="1380" r="56" fill="#B2DFDB" opacity="0.4"/>
  <rect x="100" y="1700" width="64" height="40" rx="20" fill="#00796B" opacity="0.08"/>

  <rect x="0" y="0" width="1080" height="96" fill="#FFFBFE" opacity="0.72"/>
  <text x="78" y="62" class="caption" fill="#1C1B1F" text-anchor="start">9:41</text>
  <rect x="892" y="43" width="58" height="22" rx="8" stroke="#1C1B1F" stroke-width="3" opacity="0.72"/>
  <rect x="955" y="49" width="6" height="10" rx="3" fill="#1C1B1F" opacity="0.72"/>
  <rect x="900" y="49" width="40" height="10" rx="5" fill="#1C1B1F" opacity="0.72"/>

  <rect x="800" y="128" width="72" height="40" rx="20" fill="#00796B"/>
  <text x="836" y="156" text-anchor="middle" class="localeChip">EN</text>

  <text x="540" y="176" class="headline">Love protocol</text>
  <text x="72" y="228" class="section">EKRAN 53 / PROTOCOL CALCULATING EN</text>

  <!-- Names card -->
  <rect x="72" y="280" width="936" height="160" rx="38" fill="#FFFBFE" filter="url(#cardShadow)"/>
  <text x="300" y="360" class="nameLabel">Anna</text>
  <circle cx="540" cy="360" r="28" fill="#E0F2F1"/>
  <path d="M528 360 L536 352 L544 360 L536 368 Z" fill="#00796B"/>
  <text x="780" y="360" class="nameLabel">Alex</text>

  <!-- Main animation area -->
  <rect x="72" y="480" width="936" height="1100" rx="48" fill="#FFFBFE" filter="url(#cardShadow)"/>

  <text x="540" y="600" class="calcTitle">Building protocol…</text>
  <text x="540" y="648" class="body">Please wait a few seconds</text>

  <!-- Central progress ring -->
  <circle cx="540" cy="980" r="200" fill="none" stroke="#E0F2F1" stroke-width="24"/>
  <path d="M540 780 A200 200 0 1 1 380 1040" stroke="url(#ringGradient)" stroke-width="24" stroke-linecap="round" fill="none"/>
  <circle cx="540" cy="980" r="160" fill="#E0F2F1"/>

  <!-- Checklist icon in center -->
  <rect x="480" y="920" width="120" height="120" rx="28" fill="#FFFFFF" filter="url(#cardShadow)"/>
  <rect x="508" y="948" width="64" height="12" rx="4" fill="#00796B" opacity="0.35"/>
  <rect x="508" y="972" width="48" height="12" rx="4" fill="#00796B" opacity="0.25"/>
  <rect x="508" y="996" width="56" height="12" rx="4" fill="#00796B" opacity="0.3"/>
  <circle cx="492" cy="954" r="10" fill="#E8F5E9"/>
  <path d="M486 954 L490 958 L498 950" stroke="#2E7D32" stroke-width="3" stroke-linecap="round" fill="none"/>
  <circle cx="492" cy="978" r="10" fill="#E8F5E9"/>
  <path d="M486 978 L490 982 L498 974" stroke="#2E7D32" stroke-width="3" stroke-linecap="round" fill="none"/>
  <circle cx="492" cy="1002" r="10" fill="#E0F2F1"/>
  <circle cx="492" cy="1002" r="4" fill="#00796B" opacity="0.4"/>

  <text x="540" y="1240" class="percentGhost">&#8230;</text>

  <!-- Progress steps -->
  <rect x="160" y="1320" width="760" height="12" rx="6" fill="#E7E0EC"/>
  <rect x="160" y="1320" width="380" height="12" rx="6" fill="#00796B"/>

  <circle cx="200" cy="1380" r="12" fill="#00796B"/>
  <text x="240" y="1388" class="stepText" text-anchor="start">Steps — analysis</text>

  <circle cx="200" cy="1440" r="12" fill="#00796B"/>
  <text x="240" y="1448" class="stepText" text-anchor="start">Signals — matching</text>

  <circle cx="200" cy="1500" r="12" fill="#E7E0EC"/>
  <text x="240" y="1508" class="stepText" text-anchor="start" fill="#CAC4D0">Verdict — summary</text>

  <!-- Orbiting step badges -->
  <circle cx="340" cy="900" r="32" fill="#E0F2F1"/>
  <text x="340" y="908" text-anchor="middle" style="font-family: Inter, Roboto, Arial, sans-serif; font-size: 22px; font-weight: 800; fill: #00796B;">1</text>
  <circle cx="700" cy="860" r="32" fill="#B2DFDB" opacity="0.7"/>
  <text x="700" y="868" text-anchor="middle" style="font-family: Inter, Roboto, Arial, sans-serif; font-size: 22px; font-weight: 800; fill: #004D40;">2</text>
  <circle cx="720" cy="1080" r="28" fill="#E0F2F1"/>
  <text x="720" y="1088" text-anchor="middle" style="font-family: Inter, Roboto, Arial, sans-serif; font-size: 20px; font-weight: 800; fill: #00796B;">3</text>
  <circle cx="360" cy="1060" r="24" fill="#80CBC4" opacity="0.5"/>

  <text x="540" y="2280" class="caption">Keep this screen open — result soon</text>
</svg>
