<?xml version="1.0" encoding="UTF-8"?>
<svg width="1080" height="2400" viewBox="0 0 1080 2400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#1C1B1F" flood-opacity="0.08"/>
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#00796B" flood-opacity="0.14"/>
    </filter>
    <linearGradient id="bgGlow" x1="100" y1="0" x2="980" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E0F2F1"/>
      <stop offset="0.45" stop-color="#FFFBFE"/>
      <stop offset="1" stop-color="#FCE4EC"/>
    </linearGradient>
    <linearGradient id="heroGradient" x1="72" y1="200" x2="1008" y2="700" gradientUnits="userSpaceOnUse">
      <stop stop-color="#004D40"/>
      <stop offset="0.4" stop-color="#00796B"/>
      <stop offset="0.75" stop-color="#26A69A"/>
      <stop offset="1" stop-color="#80CBC4"/>
    </linearGradient>
    <style type="text/css"><![CDATA[
      .section { font-family: Inter, Roboto, Arial, sans-serif; font-size: 21px; font-weight: 760; letter-spacing: 3px; fill: #00796B; }
      .headline { font-family: Inter, Roboto, Arial, sans-serif; font-size: 36px; font-weight: 800; fill: #1C1B1F; text-anchor: middle; }
      .percent { font-family: Inter, Roboto, Arial, sans-serif; font-size: 108px; font-weight: 800; fill: #FFFFFF; text-anchor: middle; }
      .percentLabel { font-family: Inter, Roboto, Arial, sans-serif; font-size: 32px; font-weight: 700; fill: #FFFFFF; text-anchor: middle; opacity: 0.95; }
      .names { font-family: Inter, Roboto, Arial, sans-serif; font-size: 34px; font-weight: 740; fill: #FFFFFF; text-anchor: middle; }
      .resultTitle { font-family: Inter, Roboto, Arial, sans-serif; font-size: 36px; font-weight: 800; fill: #1C1B1F; }
      .resultBody { font-family: Inter, Roboto, Arial, sans-serif; font-size: 28px; font-weight: 450; fill: #625B71; }
      .stepLabel { font-family: Inter, Roboto, Arial, sans-serif; font-size: 26px; font-weight: 650; fill: #1C1B1F; }
      .buttonText { font-family: Inter, Roboto, Arial, sans-serif; font-size: 29px; font-weight: 760; fill: #FFFFFF; }
      .outlinedText { font-family: Inter, Roboto, Arial, sans-serif; font-size: 27px; font-weight: 680; fill: #00796B; }
      .disclaimer { font-family: Inter, Roboto, Arial, sans-serif; font-size: 20px; font-weight: 450; fill: #625B71; text-anchor: middle; }
      .caption { font-family: Inter, Roboto, Arial, sans-serif; font-size: 21px; font-weight: 470; fill: #625B71; }
      .localeChip { font-family: Inter, Roboto, Arial, sans-serif; font-size: 18px; font-weight: 800; fill: #FFFFFF; }
    ]]></style>
  </defs>

  <rect width="1080" height="2400" fill="url(#bgGlow)"/>
  <circle cx="900" cy="220" r="150" fill="#B2DFDB" opacity="0.5"/>
  <circle cx="120" cy="1680" r="200" fill="#FCE4EC" opacity="0.3"/>

  <rect x="0" y="0" width="1080" height="96" fill="#FFFBFE" opacity="0.72"/>
  <text x="78" y="62" class="caption" fill="#1C1B1F">9:41</text>
  <rect x="892" y="43" width="58" height="22" rx="8" stroke="#1C1B1F" stroke-width="3" opacity="0.72"/>
  <rect x="955" y="49" width="6" height="10" rx="3" fill="#1C1B1F" opacity="0.72"/>
  <rect x="900" y="49" width="40" height="10" rx="5" fill="#1C1B1F" opacity="0.72"/>

  <rect x="800" y="128" width="72" height="40" rx="20" fill="#00796B"/>
  <text x="836" y="156" text-anchor="middle" class="localeChip">EN</text>

  <text x="540" y="168" class="headline">Protocol verdict</text>
  <text x="72" y="218" class="section">EKRAN 54 / PROTOCOL RESULT EN</text>

  <!-- Hero -->
  <rect x="72" y="260" width="936" height="640" rx="48" fill="url(#heroGradient)" filter="url(#cardShadow)"/>

  <rect x="760" y="320" width="180" height="120" rx="16" fill="#FFFFFF" opacity="0.12"/>
  <circle cx="800" cy="380" r="12" fill="#FFFFFF" opacity="0.7"/>
  <path d="M794 380 L800 372 L806 380 L800 388 Z" fill="#2E7D32"/>

  <text x="540" y="360" class="names">Anna + Alex</text>

  <circle cx="540" cy="520" r="150" fill="none" stroke="#FFFFFF" stroke-width="20" opacity="0.35"/>
  <circle cx="540" cy="520" r="150" fill="none" stroke="#FFFFFF" stroke-width="20" stroke-dasharray="780 940" stroke-linecap="round" transform="rotate(-90 540 520)"/>
  <circle cx="540" cy="520" r="120" fill="#FFFFFF" opacity="0.15"/>

  <text x="540" y="560" class="percent">82%</text>
  <text x="540" y="620" class="percentLabel">protocol score</text>

  <rect x="200" y="700" width="680" height="80" rx="32" fill="#FFFFFF" opacity="0.22"/>
  <text x="540" y="752" text-anchor="middle" style="font-family: Inter, Roboto, Arial, sans-serif; font-size: 28px; font-weight: 760; fill: #FFFFFF;">Protocol complete</text>

  <!-- Steps completed -->
  <rect x="72" y="940" width="936" height="480" rx="38" fill="#FFFBFE" filter="url(#cardShadow)"/>
  <text x="120" y="1020" class="resultTitle">Protocol summary</text>

  <circle cx="148" cy="1100" r="24" fill="#E8F5E9"/>
  <path d="M136 1100 L144 1108 L160 1092" stroke="#2E7D32" stroke-width="5" stroke-linecap="round" fill="none"/>
  <text x="200" y="1108" class="stepLabel">Steps — high harmony</text>

  <circle cx="148" cy="1180" r="24" fill="#E8F5E9"/>
  <path d="M136 1180 L144 1188 L160 1172" stroke="#2E7D32" stroke-width="5" stroke-linecap="round" fill="none"/>
  <text x="200" y="1188" class="stepLabel">Signals — strong resonance</text>

  <circle cx="148" cy="1260" r="24" fill="#E8F5E9"/>
  <path d="M136 1260 L144 1268 L160 1252" stroke="#2E7D32" stroke-width="5" stroke-linecap="round" fill="none"/>
  <text x="200" y="1268" class="stepLabel">Verdict — stable bond</text>

  <text x="120" y="1320" class="resultBody">Keep communicating openly.</text>

  <rect x="120" y="1360" width="200" height="48" rx="24" fill="#E0F2F1"/>
  <text x="220" y="1392" text-anchor="middle" style="font-family: Inter, Roboto, Arial, sans-serif; font-size: 22px; font-weight: 700; fill: #00796B;">Test #8</text>

  <!-- Actions -->
  <rect x="72" y="1460" width="936" height="88" rx="44" fill="#C2185B" filter="url(#cardShadow)"/>
  <text x="540" y="1518" text-anchor="middle" class="buttonText">Share</text>

  <rect x="72" y="1572" width="936" height="88" rx="44" fill="none" stroke="#00796B" stroke-width="3"/>
  <text x="540" y="1630" text-anchor="middle" class="outlinedText">Run again</text>

  <rect x="72" y="1680" width="936" height="88" rx="44" fill="#FCE4EC"/>
  <text x="540" y="1738" text-anchor="middle" style="font-family: Inter, Roboto, Arial, sans-serif; font-size: 27px; font-weight: 680; fill: #880E4F;">Back to hub</text>

  <text x="540" y="1820" class="disclaimer">For entertainment only.</text>

  <!-- Share preview -->
  <rect x="72" y="1880" width="936" height="200" rx="32" fill="#FFFBFE" filter="url(#cardShadow)" stroke="#B2DFDB" stroke-width="2"/>
  <rect x="120" y="1930" width="120" height="120" rx="24" fill="url(#heroGradient)"/>
  <text x="180" y="2005" text-anchor="middle" style="font-family: Inter, Roboto, Arial, sans-serif; font-size: 36px; font-weight: 800; fill: #FFFFFF;">82%</text>
  <text x="280" y="1960" class="resultTitle" style="font-size: 28px;">Anna + Alex</text>
  <text x="280" y="2000" class="resultBody" style="font-size: 24px;">Love protocol</text>
  <text x="280" y="2040" class="caption">Share preview card</text>
</svg>
