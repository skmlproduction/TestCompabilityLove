<?xml version="1.0" encoding="UTF-8"?>
<svg width="1080" height="2400" viewBox="0 0 1080 2400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#1C1B1F" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="bgGlow" x1="100" y1="0" x2="980" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFBFE"/>
      <stop offset="0.5" stop-color="#ECEFF1"/>
      <stop offset="1" stop-color="#E0F2F1"/>
    </linearGradient>
    <linearGradient id="heroMuted" x1="72" y1="200" x2="1008" y2="700" gradientUnits="userSpaceOnUse">
      <stop stop-color="#90A4AE"/>
      <stop offset="0.4" stop-color="#B0BEC5"/>
      <stop offset="0.75" stop-color="#CFD8DC"/>
      <stop offset="1" stop-color="#E0F2F1"/>
    </linearGradient>
    <style type="text/css"><![CDATA[
      .section { font-family: Inter, Roboto, Arial, sans-serif; font-size: 21px; font-weight: 760; letter-spacing: 3px; fill: #00796B; }
      .headline { font-family: Inter, Roboto, Arial, sans-serif; font-size: 36px; font-weight: 800; fill: #1C1B1F; text-anchor: middle; }
      .percent { font-family: Inter, Roboto, Arial, sans-serif; font-size: 108px; font-weight: 800; fill: #546E7A; text-anchor: middle; }
      .percentLabel { font-family: Inter, Roboto, Arial, sans-serif; font-size: 32px; font-weight: 700; fill: #78909C; text-anchor: middle; }
      .names { font-family: Inter, Roboto, Arial, sans-serif; font-size: 34px; font-weight: 740; fill: #FFFFFF; text-anchor: middle; }
      .resultTitle { font-family: Inter, Roboto, Arial, sans-serif; font-size: 36px; font-weight: 800; fill: #004D40; }
      .resultBody { font-family: Inter, Roboto, Arial, sans-serif; font-size: 28px; font-weight: 450; fill: #625B71; }
      .stepLabel { font-family: Inter, Roboto, Arial, sans-serif; font-size: 26px; font-weight: 650; fill: #37474F; }
      .buttonText { font-family: Inter, Roboto, Arial, sans-serif; font-size: 29px; font-weight: 760; fill: #FFFFFF; }
      .outlinedText { font-family: Inter, Roboto, Arial, sans-serif; font-size: 27px; font-weight: 680; fill: #00796B; }
      .disclaimer { font-family: Inter, Roboto, Arial, sans-serif; font-size: 20px; font-weight: 450; fill: #625B71; text-anchor: middle; }
      .caption { font-family: Inter, Roboto, Arial, sans-serif; font-size: 21px; font-weight: 470; fill: #625B71; }
      .chipText { font-family: Inter, Roboto, Arial, sans-serif; font-size: 22px; font-weight: 700; fill: #004D40; }
      .localeChip { font-family: Inter, Roboto, Arial, sans-serif; font-size: 18px; font-weight: 800; fill: #FFFFFF; }
    ]]></style>
  </defs>

  <rect width="1080" height="2400" fill="url(#bgGlow)"/>

  <rect x="0" y="0" width="1080" height="96" fill="#FFFBFE" opacity="0.72"/>
  <text x="78" y="62" class="caption" fill="#1C1B1F">9:41</text>
  <rect x="892" y="43" width="58" height="22" rx="8" stroke="#1C1B1F" stroke-width="3" opacity="0.72"/>
  <rect x="955" y="49" width="6" height="10" rx="3" fill="#1C1B1F" opacity="0.72"/>
  <rect x="900" y="49" width="40" height="10" rx="5" fill="#1C1B1F" opacity="0.72"/>

  <rect x="800" y="128" width="72" height="40" rx="20" fill="#00796B"/>
  <text x="836" y="156" text-anchor="middle" class="localeChip">EN</text>

  <text x="540" y="168" class="headline">Protocol verdict</text>
  <text x="72" y="218" class="section">EKRAN 55 / PROTOCOL RESULT LOW EN</text>

  <rect x="72" y="260" width="936" height="600" rx="48" fill="url(#heroMuted)" filter="url(#cardShadow)"/>

  <rect x="760" y="320" width="180" height="100" rx="16" fill="#FFFFFF" opacity="0.12"/>
  <rect x="780" y="340" width="140" height="10" rx="4" fill="#FFFFFF" opacity="0.35"/>
  <rect x="780" y="362" width="100" height="10" rx="4" fill="#FFFFFF" opacity="0.25"/>
  <circle cx="800" cy="400" r="10" fill="#FFFFFF" opacity="0.4"/>

  <text x="540" y="360" class="names">Anna + Alex</text>

  <circle cx="540" cy="520" r="150" fill="none" stroke="#FFFFFF" stroke-width="20" opacity="0.45"/>
  <path d="M540 370 A150 150 0 0 1 600 620" stroke="#FFFFFF" stroke-width="20" stroke-linecap="round" fill="none" opacity="0.65"/>
  <circle cx="540" cy="520" r="120" fill="#FFFFFF" opacity="0.12"/>

  <text x="540" y="560" class="percent">34%</text>
  <text x="540" y="620" class="percentLabel">protocol score</text>

  <rect x="200" y="700" width="680" height="80" rx="32" fill="#FFFFFF" opacity="0.22"/>
  <text x="540" y="752" text-anchor="middle" style="font-family: Inter, Roboto, Arial, sans-serif; font-size: 28px; font-weight: 760; fill: #FFFFFF;">A pause may help</text>

  <!-- Warning message -->
  <rect x="72" y="900" width="936" height="280" rx="38" fill="#E0F2F1" filter="url(#cardShadow)"/>
  <rect x="120" y="960" width="56" height="56" rx="16" fill="#FFFFFF"/>
  <text x="148" y="1000" text-anchor="middle" style="font-family: Inter, Roboto, Arial, sans-serif; font-size: 32px; font-weight: 800; fill: #00796B;">!</text>
  <text x="200" y="980" class="resultTitle">Weak signal</text>
  <text x="120" y="1050" class="resultBody" fill="#004D40" opacity="0.88">Protocol shows a caution zone —</text>
  <text x="120" y="1094" class="resultBody" fill="#004D40" opacity="0.88">not a verdict — a reason to talk.</text>
  <text x="120" y="1138" class="resultBody" fill="#004D40" opacity="0.88">Try the protocol again or another test.</text>

  <rect x="120" y="1160" width="240" height="48" rx="24" fill="#FFFFFF" opacity="0.75"/>
  <text x="240" y="1192" text-anchor="middle" class="chipText">Below 50%</text>

  <!-- Steps with warnings -->
  <rect x="72" y="1212" width="936" height="360" rx="38" fill="#FFFBFE" filter="url(#cardShadow)"/>
  <text x="120" y="1288" class="resultTitle" fill="#1C1B1F">Protocol summary</text>

  <circle cx="148" cy="1360" r="24" fill="#FFF3E0"/>
  <text x="148" y="1368" text-anchor="middle" style="font-family: Inter, Roboto, Arial, sans-serif; font-size: 22px; font-weight: 800; fill: #E65100;">!</text>
  <text x="200" y="1368" class="stepLabel">Steps — need attention</text>

  <circle cx="148" cy="1440" r="24" fill="#FFF3E0"/>
  <text x="148" y="1448" text-anchor="middle" style="font-family: Inter, Roboto, Arial, sans-serif; font-size: 22px; font-weight: 800; fill: #E65100;">!</text>
  <text x="200" y="1448" class="stepLabel">Signals — some mismatch</text>

  <circle cx="148" cy="1520" r="24" fill="#ECEFF1"/>
  <circle cx="148" cy="1520" r="8" fill="#78909C"/>
  <text x="200" y="1528" class="stepLabel" fill="#78909C">Verdict — cautious mode</text>

  <rect x="120" y="1540" width="200" height="48" rx="24" fill="#E0F2F1"/>
  <text x="220" y="1572" text-anchor="middle" style="font-family: Inter, Roboto, Arial, sans-serif; font-size: 22px; font-weight: 700; fill: #00796B;">Test #8</text>

  <rect x="72" y="1600" width="936" height="140" rx="32" fill="#FFFBFE" filter="url(#cardShadow)"/>
  <text x="120" y="1668" class="resultTitle" fill="#1C1B1F" style="font-size: 30px;">Tip</text>
  <text x="120" y="1712" class="resultBody">Open dialogue matters more than the score.</text>

  <rect x="72" y="1772" width="936" height="88" rx="44" fill="#00796B" filter="url(#cardShadow)"/>
  <text x="540" y="1830" text-anchor="middle" class="buttonText">Share</text>

  <rect x="72" y="1884" width="936" height="88" rx="44" fill="none" stroke="#00796B" stroke-width="3"/>
  <text x="540" y="1942" text-anchor="middle" class="outlinedText">Run again</text>

  <rect x="72" y="1992" width="936" height="88" rx="44" fill="#FCE4EC"/>
  <text x="540" y="2050" text-anchor="middle" style="font-family: Inter, Roboto, Arial, sans-serif; font-size: 27px; font-weight: 680; fill: #880E4F;">Back to hub</text>

  <text x="540" y="2132" class="disclaimer">For entertainment only.</text>

  <g transform="translate(540 2280)" opacity="0.12">
    <rect x="-48" y="-32" width="96" height="64" rx="12" fill="#546E7A"/>
    <line x1="0" y1="-20" x2="0" y2="52" stroke="#546E7A" stroke-width="5"/>
  </g>
</svg>
