<?xml version="1.0" encoding="UTF-8"?>
<svg width="1080" height="2400" viewBox="0 0 1080 2400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#1C1B1F" flood-opacity="0.08"/>
      <feDropShadow dx="0" dy="2" stdDeviation="7" flood-color="#00796B" flood-opacity="0.14"/>
    </filter>
    <linearGradient id="bgGlow" x1="132" y1="0" x2="988" y2="850" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E0F2F1"/>
      <stop offset="0.35" stop-color="#FFFBFE"/>
      <stop offset="0.7" stop-color="#FFF0F5"/>
      <stop offset="1" stop-color="#FCE4EC"/>
    </linearGradient>
    <linearGradient id="protocolGradient" x1="72" y1="320" x2="1008" y2="980" gradientUnits="userSpaceOnUse">
      <stop stop-color="#004D40"/>
      <stop offset="0.45" stop-color="#00796B"/>
      <stop offset="1" stop-color="#26A69A"/>
    </linearGradient>
    <style type="text/css"><![CDATA[
      .appTitle { font-family: Inter, Roboto, Arial, sans-serif; font-size: 34px; font-weight: 760; fill: #1C1B1F; }
      .skip { font-family: Inter, Roboto, Arial, sans-serif; font-size: 27px; font-weight: 680; fill: #00796B; }
      .section { font-family: Inter, Roboto, Arial, sans-serif; font-size: 21px; font-weight: 760; letter-spacing: 3px; fill: #00796B; }
      .heroKicker { font-family: Inter, Roboto, Arial, sans-serif; font-size: 23px; font-weight: 780; letter-spacing: 3px; fill: #FFFFFF; opacity: 0.88; }
      .heroTitle { font-family: Inter, Roboto, Arial, sans-serif; font-size: 48px; font-weight: 830; letter-spacing: -1.1px; fill: #FFFFFF; }
      .heroBody { font-family: Inter, Roboto, Arial, sans-serif; font-size: 28px; font-weight: 450; fill: #FFFFFF; opacity: 0.92; }
      .headline { font-family: Inter, Roboto, Arial, sans-serif; font-size: 46px; font-weight: 800; letter-spacing: -1px; fill: #1C1B1F; }
      .body { font-family: Inter, Roboto, Arial, sans-serif; font-size: 28px; font-weight: 450; fill: #625B71; }
      .cardTitle { font-family: Inter, Roboto, Arial, sans-serif; font-size: 26px; font-weight: 740; fill: #1C1B1F; }
      .cardTitleLight { font-family: Inter, Roboto, Arial, sans-serif; font-size: 30px; font-weight: 800; fill: #FFFFFF; }
      .cardCaption { font-family: Inter, Roboto, Arial, sans-serif; font-size: 20px; font-weight: 470; fill: #625B71; }
      .cardCaptionLight { font-family: Inter, Roboto, Arial, sans-serif; font-size: 22px; font-weight: 450; fill: #FFFFFF; opacity: 0.9; }
      .stepNum { font-family: Inter, Roboto, Arial, sans-serif; font-size: 22px; font-weight: 800; fill: #00796B; text-anchor: middle; }
      .stepText { font-family: Inter, Roboto, Arial, sans-serif; font-size: 22px; font-weight: 600; fill: #1C1B1F; }
      .caption { font-family: Inter, Roboto, Arial, sans-serif; font-size: 21px; font-weight: 470; fill: #625B71; }
      .buttonText { font-family: Inter, Roboto, Arial, sans-serif; font-size: 29px; font-weight: 760; fill: #FFFFFF; }
      .localeChip { font-family: Inter, Roboto, Arial, sans-serif; font-size: 18px; font-weight: 800; fill: #FFFFFF; }
    ]]></style>
  </defs>

  <rect width="1080" height="2400" fill="url(#bgGlow)"/>
  <circle cx="888" cy="168" r="246" fill="#B2DFDB" opacity="0.4"/>
  <circle cx="126" cy="826" r="204" fill="#FCE4EC" opacity="0.25"/>
  <circle cx="978" cy="2050" r="314" fill="#E0F2F1" opacity="0.35"/>

  <rect x="0" y="0" width="1080" height="96" fill="#FFFBFE" opacity="0.68"/>
  <text x="78" y="62" class="caption" fill="#1C1B1F">9:41</text>
  <rect x="892" y="43" width="58" height="22" rx="8" stroke="#1C1B1F" stroke-width="3" opacity="0.72"/>
  <rect x="955" y="49" width="6" height="10" rx="3" fill="#1C1B1F" opacity="0.72"/>
  <rect x="900" y="49" width="40" height="10" rx="5" fill="#1C1B1F" opacity="0.72"/>

  <rect x="800" y="128" width="72" height="40" rx="20" fill="#00796B"/>
  <text x="836" y="156" text-anchor="middle" class="localeChip">EN</text>

  <text x="72" y="176" class="appTitle">Love Tester</text>
  <text x="906" y="176" class="skip">Skip</text>

  <rect x="72" y="238" width="936" height="12" rx="6" fill="#E7E0EC"/>
  <rect x="72" y="238" width="702" height="12" rx="6" fill="#00796B"/>
  <text x="72" y="302" class="section">EKRAN 56 / ONBOARDING PROTOCOL EN</text>

  <rect x="72" y="340" width="936" height="480" rx="54" fill="url(#protocolGradient)" filter="url(#cardShadow)"/>
  <circle cx="820" cy="460" r="100" fill="#FFFFFF" opacity="0.12"/>
  <rect x="720" y="520" width="240" height="160" rx="20" fill="#FFFFFF" opacity="0.1"/>
  <rect x="740" y="544" width="200" height="12" rx="4" fill="#FFFFFF" opacity="0.35"/>
  <rect x="740" y="568" width="160" height="12" rx="4" fill="#FFFFFF" opacity="0.25"/>
  <rect x="740" y="592" width="180" height="12" rx="4" fill="#FFFFFF" opacity="0.3"/>
  <circle cx="760" cy="640" r="10" fill="#E8F5E9"/>
  <path d="M754 640 L758 644 L768 634" stroke="#2E7D32" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <rect x="120" y="380" width="112" height="40" rx="20" fill="#FFFFFF"/>
  <text x="176" y="408" text-anchor="middle" style="font-family: Inter, Roboto, Arial, sans-serif; font-size: 20px; font-weight: 800; fill: #00796B;">NEW</text>

  <text x="120" y="460" class="heroKicker">TEST #8</text>
  <text x="120" y="540" class="heroTitle">Love</text>
  <text x="120" y="600" class="heroTitle" style="font-size: 44px;">protocol</text>
  <text x="120" y="668" class="heroBody">Three steps — from harmony</text>
  <text x="120" y="706" class="heroBody">to your personal verdict.</text>
  <rect x="120" y="740" width="280" height="56" rx="28" fill="#FFFFFF" opacity="0.2"/>
  <text x="144" y="776" style="font-family: Inter, Roboto, Arial, sans-serif; font-size: 23px; font-weight: 760; fill: #FFFFFF;">Page 3 of 4</text>

  <text x="72" y="900" class="headline">Step-by-step mode</text>
  <text x="72" y="958" class="body">Enter names — get signals</text>
  <text x="72" y="998" class="body">and a protocol summary. No server.</text>

  <!-- Steps preview -->
  <rect x="72" y="1060" width="936" height="120" rx="32" fill="#FFFBFE" filter="url(#cardShadow)"/>
  <circle cx="200" cy="1120" r="32" fill="#E0F2F1"/>
  <text x="200" y="1128" class="stepNum">1</text>
  <text x="260" y="1128" class="stepText">Steps</text>
  <circle cx="480" cy="1120" r="32" fill="#E0F2F1"/>
  <text x="480" y="1128" class="stepNum">2</text>
  <text x="540" y="1128" class="stepText">Signals</text>
  <circle cx="760" cy="1120" r="32" fill="#E0F2F1"/>
  <text x="760" y="1128" class="stepNum">3</text>
  <text x="820" y="1128" class="stepText">Verdict</text>

  <!-- Other tests hint -->
  <rect x="72" y="1220" width="450" height="176" rx="32" fill="#FFFBFE" filter="url(#cardShadow)"/>
  <rect x="108" y="1260" width="56" height="56" rx="18" fill="#FCE4EC"/>
  <path d="M124 1292 C124 1280 136 1272 148 1280 C160 1272 172 1280 172 1292 C172 1308 148 1324 148 1324 C148 1324 124 1308 124 1292 Z" fill="#C2185B"/>
  <text x="188" y="1308" class="cardTitle">Love test</text>
  <text x="188" y="1344" class="cardCaption">Popular start</text>

  <rect x="558" y="1220" width="450" height="176" rx="32" fill="#FFFBFE" filter="url(#cardShadow)"/>
  <rect x="594" y="1260" width="56" height="56" rx="18" fill="#FCE4EC"/>
  <text x="614" y="1300" style="font-family: Inter, Roboto, Arial, sans-serif; font-size: 24px; font-weight: 800; fill: #C2185B;">%</text>
  <text x="674" y="1308" class="cardTitle">Calculator</text>
  <text x="674" y="1344" class="cardCaption">+ 6 modes in the hub</text>

  <!-- Protocol CTA card -->
  <rect x="72" y="1432" width="936" height="200" rx="38" fill="url(#protocolGradient)" filter="url(#cardShadow)"/>
  <rect x="120" y="1480" width="56" height="56" rx="18" fill="#FFFFFF" opacity="0.22"/>
  <rect x="132" y="1496" width="32" height="8" rx="3" fill="#FFFFFF" opacity="0.85"/>
  <rect x="132" y="1512" width="24" height="8" rx="3" fill="#FFFFFF" opacity="0.65"/>
  <circle cx="128" cy="1500" r="8" fill="#E8F5E9"/>
  <path d="M124 1500 L127 1503 L134 1496" stroke="#2E7D32" stroke-width="2" stroke-linecap="round" fill="none"/>
  <text x="200" y="1520" class="cardTitleLight">Opens from the main menu</text>
  <text x="200" y="1564" class="cardCaptionLight">Card with a NEW badge</text>
  <rect x="820" y="1500" width="140" height="56" rx="28" fill="#FFFFFF"/>
  <text x="890" y="1536" text-anchor="middle" style="font-family: Inter, Roboto, Arial, sans-serif; font-size: 24px; font-weight: 800; fill: #00796B;">GO</text>

  <rect x="72" y="1680" width="936" height="120" rx="32" fill="#E0F2F1" filter="url(#cardShadow)"/>
  <text x="120" y="1736" class="cardTitle" fill="#004D40">After onboarding</text>
  <text x="120" y="1776" class="cardCaption" fill="#00796B">Protocol card in hub with NEW badge</text>

  <rect x="72" y="2172" width="936" height="88" rx="44" fill="#00796B"/>
  <text x="540" y="2228" text-anchor="middle" class="buttonText">Next</text>
  <circle cx="432" cy="2330" r="9" fill="#CAC4D0"/>
  <circle cx="486" cy="2330" r="9" fill="#CAC4D0"/>
  <circle cx="540" cy="2330" r="9" fill="#00796B"/>
  <circle cx="594" cy="2330" r="9" fill="#CAC4D0"/>
</svg>
