  <text x="120" y="580" class="fieldLabel">&#1042;&#1072;&#1096;&#1077; &#1080;&#1084;&#1103;</text>
  <rect x="120" y="600" width="840" height="96" rx="28" fill="#FFFFFF" stroke="#C2185B" stroke-width="3"/>
  <text x="152" y="662" class="fieldText">&#1040;&#1085;&#1085;&#1072;</text>
  <circle cx="920" cy="648" r="20" fill="#FCE4EC"/>
  <path d="M912 648 L920 640 L928 648 L920 656 Z" fill="#C2185B" opacity="0.6"/>

  <text x="120" y="760" class="fieldLabel">&#1048;&#1084;&#1103; &#1087;&#1072;&#1088;&#1090;&#1085;&#1105;&#1088;&#1072; / &#1076;&#1088;&#1091;&#1075;&#1072;</text>
  <rect x="120" y="780" width="840" height="96" rx="28" fill="#FFFFFF" stroke="#CAC4D0" stroke-width="2"/>
  <text x="152" y="842" class="fieldHint">&#1053;&#1072;&#1087;&#1088;&#1080;&#1084;&#1077;&#1088;, &#1052;&#1072;&#1082;&#1089;&#1080;&#1084;&#8230;</text>

  <!-- Example chips -->
  <text x="120" y="940" class="fieldHint">&#1055;&#1086;&#1087;&#1091;&#1083;&#1103;&#1088;&#1085;&#1099;&#1077; &#1087;&#1072;&#1088;&#1099;:</text>
  <rect x="120" y="960" width="160" height="48" rx="24" fill="#FCE4EC"/>
  <text x="200" y="992" text-anchor="middle" class="fieldHint" fill="#880E4F">&#1040;&#1085;&#1085;&#1072; + &#1052;&#1072;&#1082;&#1089;</text>
  <rect x="300" y="960" width="200" height="48" rx="24" fill="#FCE4EC"/>
  <text x="400" y="992" text-anchor="middle" class="fieldHint" fill="#880E4F">&#1052;&#1072;&#1088;&#1080;&#1103; + &#1048;&#1074;&#1072;&#1085;</text>

  <rect x="120" y="1040" width="840" height="120" rx="24" fill="#FCE4EC"/>
  <text x="152" y="1090" class="body" fill="#880E4F">&#1057;&#1086;&#1074;&#1077;&#1090;: &#1088;&#1077;&#1079;&#1091;&#1083;&#1100;&#1090;&#1072;&#1090; &#1090;&#1086;&#1083;&#1100;&#1082;&#1086; &#1076;&#1083;&#1103; &#1088;&#1072;&#1079;&#1074;&#1083;&#1077;&#1095;&#1077;&#1085;&#1080;&#1103;.</text>
  <text x="152" y="1130" class="caption" fill="#880E4F">&#1053;&#1077; &#1089;&#1086;&#1093;&#1088;&#1072;&#1085;&#1103;&#1077;&#1084; &#1080;&#1084;&#1077;&#1085;&#1072; &#1085;&#1072; &#1089;&#1077;&#1088;&#1074;&#1077;&#1088;&#1077;.</text>

  <!-- CTA -->
  <rect x="72" y="1280" width="936" height="96" rx="48" fill="#C2185B" filter="url(#cardShadow)"/>
  <text x="540" y="1338" text-anchor="middle" class="buttonText">&#1056;&#1072;&#1089;&#1089;&#1095;&#1080;&#1090;&#1072;&#1090;&#1100; &#1083;&#1102;&#1073;&#1086;&#1074;&#1100;</text>

  <!-- Keyboard placeholder -->
  <rect x="0" y="1520" width="1080" height="520" rx="0" fill="#F3EDF7" opacity="0.95"/>
  <line x1="0" y1="1520" x2="1080" y2="1520" stroke="#E7E0EC" stroke-width="2"/>
  <text x="540" y="1580" text-anchor="middle" class="caption">&#1057;&#1080;&#1089;&#1090;&#1077;&#1084;&#1085;&#1072;&#1103; &#1082;&#1083;&#1072;&#1074;&#1080;&#1072;&#1090;&#1091;&#1088;&#1072; (IME)</text>
