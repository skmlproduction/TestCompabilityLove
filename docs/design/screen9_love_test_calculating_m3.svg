      .caption { font-family: Inter, Roboto, Arial, sans-serif; font-size: 21px; font-weight: 470; fill: #625B71; text-anchor: middle; }
      .percentGhost { font-family: Inter, Roboto, Arial, sans-serif; font-size: 96px; font-weight: 800; fill: #C2185B; opacity: 0.12; text-anchor: middle; }
    ]]></style>
